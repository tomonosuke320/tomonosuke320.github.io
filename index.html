<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Scrapper</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2003/svg' viewBox='0 0 24 24' fill='none' stroke='%232563eb' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z'/></svg>">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- IndexedDB Library -->
    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
    <!-- Google API Loader -->
    <script async defer src="https://apis.google.com/js/api.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client"></script>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- config.js -->
    <script src="config.js" onerror="console.warn('config.js が見つかりません。')"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }
        .memo-grid { column-count: 1; column-gap: 1.5rem; }
        @media (min-width: 768px) { .memo-grid { column-count: 2; } }
        @media (min-width: 1024px) { .memo-grid { column-count: 3; } }
        .memo-item { break-inside: avoid; margin-bottom: 1.5rem; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-enter { animation: fadeIn 0.2s ease-out forwards; }
        .btn-loading { pointer-events: none; opacity: 0.7; }

        /* Leaflet Pop-up */
        .leaflet-popup-content-wrapper { border-radius: 1rem; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); padding: 0; }
        .leaflet-popup-content { margin: 12px; }
        #mapView { height: calc(100vh - 280px); min-height: 400px; width: 100%; border-radius: 1.5rem; z-index: 10; }
    </style>
</head>
<body class="text-slate-900 pb-20">

    <!-- トースト通知エリア -->
    <div id="toastContainer" class="fixed bottom-20 left-1/2 transform -translate-x-1/2 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <!-- カスタム確認ダイアログ -->
    <div id="confirmModal" class="fixed inset-0 z-[200] hidden flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4">
        <div class="bg-white rounded-[2rem] p-6 max-w-xs w-full shadow-2xl modal-enter">
            <p id="confirmMsg" class="text-slate-800 font-black mb-6 text-center text-sm leading-relaxed whitespace-pre-wrap"></p>
            <div class="flex gap-3">
                <button id="confirmCancelBtn" class="flex-1 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-xs hover:bg-slate-200 transition-colors">キャンセル</button>
                <button id="confirmOkBtn" class="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold text-xs hover:bg-red-600 shadow-lg shadow-red-200 transition-colors">OK</button>
            </div>
        </div>
    </div>

    <!-- ナビゲーションバー -->
    <nav class="bg-white/90 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-200 rotate-[-10deg]">
                        <i data-lucide="send" size="26"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-black text-slate-800 tracking-tight leading-none mb-1">Travel Scrapper <span class="text-xs font-bold text-slate-400 ml-1">v1.7.1</span></h1>
                        
                        <div class="flex items-center mt-1">
                            <select id="pageSelect" class="bg-blue-50 text-blue-700 font-black text-[11px] px-2.5 py-1 rounded-lg border border-blue-100 outline-none cursor-pointer appearance-none pr-6 relative hover:bg-blue-100 transition-colors shadow-sm" style="background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2216%22%20height%3D%2216%22%20fill%3D%22none%22%20stroke%3D%22%232563eb%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%224%206%208%2010%2012%206%22%2F%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right 4px center;">
                            </select>
                            
                            <button id="openPageSettingsBtn" class="ml-1.5 p-1 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-md transition-colors" title="現在のページ設定">
                                <i data-lucide="settings" size="14"></i>
                            </button>
                            
                            <div class="w-px h-3 bg-slate-200 mx-1.5"></div>
                            
                            <button id="openNewPageBtn" class="p-1 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-md transition-colors" title="新しいページを追加">
                                <i data-lucide="plus" size="14"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col items-end gap-2">
                    <div class="flex items-center gap-1.5">
                        <button id="openSettingsBtn" class="p-2 transition-colors rounded-xl text-slate-400 bg-slate-50 hover:scale-105" title="AI機能の設定">
                            <i data-lucide="bot" size="20"></i>
                        </button>
                        <button id="driveSyncBtn" class="flex items-center gap-2 px-5 py-2.5 bg-slate-600 text-white rounded-xl font-bold text-sm shadow-lg shadow-slate-200 hover:bg-slate-700 active:scale-95 transition-all">
                            <span id="syncIconWrapper" class="inline-block"><i data-lucide="cloud" size="18"></i></span>
                            <span id="driveSyncText">Drive連携</span>
                        </button>
                    </div>
                    
                    <div class="flex items-center gap-2">
                        <button id="logoutBtn" class="hidden flex items-center gap-1 px-2 text-red-600 font-bold text-[10px] hover:underline transition-colors">
                            <i data-lucide="log-out" size="12"></i>ログアウト
                        </button>
                        <button id="clearDataBtn" class="flex items-center gap-1 px-2 text-slate-400 font-bold text-[10px] hover:text-red-500 hover:underline transition-colors">
                            <i data-lucide="trash-2" size="12"></i>全データ初期化
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 検索バー & タブ切り替え -->
    <div class="max-w-6xl mx-auto px-4 mt-6">
        <div class="bg-white p-4 md:p-6 rounded-3xl border border-slate-200 shadow-sm flex flex-col gap-4">
            
            <div id="viewModeTabs" class="flex gap-2 p-1 bg-slate-100 rounded-2xl w-full sm:w-auto self-start">
                <button id="tabListBtn" class="flex-1 sm:flex-none px-6 py-2.5 rounded-xl text-sm font-bold transition-all bg-white text-slate-800 shadow-sm flex items-center justify-center gap-2">
                    <i data-lucide="layout-grid" size="16"></i>リスト
                </button>
                <button id="tabMapBtn" class="flex-1 sm:flex-none px-6 py-2.5 rounded-xl text-sm font-bold transition-all text-slate-500 hover:text-slate-800 flex items-center justify-center gap-2">
                    <i data-lucide="map" size="16"></i>マップ
                </button>
            </div>

            <div class="relative">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size="20"></i>
                <input type="text" id="searchInput" placeholder="保存した場所を検索..." class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-500/10 outline-none transition-all text-base shadow-inner" />
            </div>
            
            <div id="tagList" class="flex items-center gap-2 overflow-x-auto no-scrollbar py-1">
                <i data-lucide="tag" class="text-slate-400 shrink-0" size="16"></i>
                <button class="tag-chip px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all bg-blue-600 text-white" data-tag="all">すべて</button>
            </div>
        </div>
    </div>

    <!-- メイン表示 (リスト表示用) -->
    <main id="memoContainer" class="max-w-6xl mx-auto px-4 mt-8 memo-grid">
        <div class="col-span-full py-32 flex flex-col items-center text-center px-10 text-slate-400">
            <i data-lucide="plane" size="48" class="mb-4 opacity-20"></i>
            <p>同期中、またはデータがありません</p>
        </div>
    </main>

    <!-- メイン表示 (マップ表示用) -->
    <div id="mapContainerWrapper" class="max-w-6xl mx-auto px-4 mt-8 hidden">
        <div id="mapView" class="border border-slate-200 shadow-sm overflow-hidden"></div>
        <p class="text-xs text-slate-400 font-medium text-center mt-3">
            ※マップに表示されない場所は、編集から「場所を正確に推察」ボタンを押し直して保存してください。
        </p>
    </div>

    <!-- 追加ボタン -->
    <button id="fabAdd" class="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-full shadow-lg shadow-blue-300 flex items-center justify-center hover:bg-blue-700 active:scale-90 transition-transform z-50">
        <i data-lucide="plus" size="28"></i>
    </button>

    <!-- メモ詳細（ポップアップ）モーダル -->
    <div id="memoViewModal" class="fixed inset-0 z-[80] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-6 shadow-2xl modal-enter max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-start mb-4 gap-4">
                <h2 id="memoViewTitle" class="text-xl font-black text-slate-800 tracking-tight leading-snug"></h2>
                <button id="closeMemoViewBtn" class="text-slate-400 hover:text-slate-600 transition-colors shrink-0 p-1 bg-slate-100 rounded-full"><i data-lucide="x" size="20"></i></button>
            </div>
            <div class="overflow-y-auto no-scrollbar">
                <div id="memoViewContent" class="whitespace-pre-wrap text-sm leading-loose text-slate-700 bg-slate-50 p-5 rounded-2xl border border-slate-100"></div>
            </div>
            <div class="mt-4 pt-2">
               <button id="memoViewEditBtn" class="w-full flex items-center justify-center gap-2 py-3 bg-blue-50 text-blue-600 rounded-xl font-bold text-sm hover:bg-blue-100 transition-colors shadow-sm"><i data-lucide="pencil" size="16"></i> 編集する</button>
            </div>
        </div>
    </div>

    <!-- ページ設定（編集）モーダル -->
    <div id="pageSettingsModal" class="fixed inset-0 z-[70] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 shadow-2xl modal-enter">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-slate-800 flex items-center gap-2">
                    <i data-lucide="settings" class="text-slate-400"></i>ページ設定
                </h2>
                <button id="closePageSettingsBtn" class="text-slate-400 hover:text-slate-600 transition-colors"><i data-lucide="x" size="24"></i></button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase tracking-widest">ページ名</label>
                    <div class="flex gap-2">
                        <input type="text" id="settingPageName" class="flex-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm font-bold text-slate-800">
                        <button id="savePageNameBtn" class="px-4 py-2 bg-slate-800 text-white rounded-xl font-bold text-sm hover:bg-slate-900 transition-colors">変更</button>
                    </div>
                </div>

                <div class="pt-2 border-t border-slate-100 mt-2">
                    <div class="flex items-center justify-between py-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest cursor-pointer" for="settingMapToggle">マップ機能（場所のピン留め）</label>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="settingMapToggle" class="sr-only peer">
                            <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
                        </label>
                    </div>
                    <p class="text-[9px] text-slate-400">オフにするとシンプルなブックマークアプリとして使えます。</p>
                </div>

                <div class="pt-2 border-t border-slate-100">
                    <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase tracking-widest">Googleドライブ連携</label>
                    <p id="settingDriveStatus" class="text-[11px] text-slate-500 mb-2 font-bold px-1"></p>
                    <div class="flex gap-2 mb-2">
                        <button id="settingDrivePickerFolderBtn" class="flex-1 flex items-center justify-center gap-1 py-3 bg-blue-50 text-blue-600 border border-blue-200 rounded-xl font-bold hover:bg-blue-100 transition-colors text-xs shadow-sm">
                            <i data-lucide="folder-search" size="14"></i>フォルダから探す
                        </button>
                        <button id="settingDrivePickerFlatBtn" class="flex-1 flex items-center justify-center gap-1 py-3 bg-blue-50 text-blue-600 border border-blue-200 rounded-xl font-bold hover:bg-blue-100 transition-colors text-xs shadow-sm">
                            <i data-lucide="list" size="14"></i>全ファイル一覧
                        </button>
                    </div>
                    <!-- ★ 強制リセットボタンを追加 -->
                    <button id="forceResetTokenBtn" class="w-full flex items-center justify-center gap-1 py-2 bg-slate-100 text-slate-500 border border-slate-200 rounded-lg font-bold hover:bg-slate-200 transition-colors text-[10px]">
                        <i data-lucide="refresh-cw" size="12"></i> ログイン状態を強制リセット（エラー時用）
                    </button>
                </div>

                <div class="pt-2 border-t border-slate-100">
                    <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase tracking-widest">PCへのバックアップ・復元</label>
                    <div class="flex gap-2">
                        <label class="flex-1 flex items-center justify-center gap-2 py-3 bg-slate-50 text-slate-600 border border-slate-200 rounded-xl font-bold hover:bg-white cursor-pointer transition-colors text-sm shadow-sm">
                            <i data-lucide="file-up" size="16"></i>読込
                            <input type="file" id="settingFileInput" accept=".json" class="hidden">
                        </label>
                        <button id="settingExportBtn" class="flex-1 flex items-center justify-center gap-2 py-3 bg-slate-50 text-slate-600 border border-slate-200 rounded-xl font-bold hover:bg-white transition-colors text-sm shadow-sm">
                            <i data-lucide="download" size="16"></i>書出
                        </button>
                    </div>
                </div>

                <div class="pt-2 mt-2 border-t border-red-100">
                    <button id="settingDeletePageBtn" class="w-full flex items-center justify-center gap-2 py-3 bg-red-50 text-red-600 rounded-xl font-bold hover:bg-red-100 transition-colors text-sm">
                        <i data-lucide="trash-2" size="18"></i>このページを削除
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 新規ページ追加モーダル -->
    <div id="newPageModal" class="fixed inset-0 z-[70] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 shadow-2xl modal-enter">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-slate-800 flex items-center gap-2">
                    <i data-lucide="file-plus-2" class="text-blue-500"></i>ページを追加
                </h2>
                <button id="closeNewPageBtn" class="text-slate-400 hover:text-slate-600 transition-colors"><i data-lucide="x" size="24"></i></button>
            </div>
            
            <div class="space-y-6">
                <!-- 1. 新規作成 -->
                <div>
                    <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase tracking-widest">1. 空のページを新規作成</label>
                    <input type="text" id="newPageName" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm font-bold text-slate-800 mb-2" placeholder="ページ名 (例：北海道旅行)">
                    <div class="flex gap-2">
                        <button id="createNewLocalBtn" class="flex-1 py-2.5 bg-slate-800 text-white rounded-xl font-bold text-xs hover:bg-slate-900 transition-colors shadow-md">ローカル作成</button>
                        <button id="createNewDriveBtn" class="flex-1 flex items-center justify-center gap-1 py-2.5 bg-blue-600 text-white rounded-xl font-bold text-xs hover:bg-blue-700 transition-colors shadow-md">
                            <i data-lucide="cloud-upload" size="14"></i>Driveに作成
                        </button>
                    </div>
                </div>

                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-slate-100"></div>
                    <span class="shrink-0 px-3 text-[10px] font-bold text-slate-300 uppercase">OR</span>
                    <div class="flex-grow border-t border-slate-100"></div>
                </div>

                <!-- 2. 既存のファイルから作成 -->
                <div>
                    <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase tracking-widest">2. 既存のファイルから追加</label>
                    <div class="flex flex-col gap-2">
                        <!-- ドライブから開く -->
                        <div class="flex gap-2">
                            <button id="createNewFromDriveFolderBtn" class="flex-1 flex items-center justify-center gap-1 py-3 bg-blue-50 text-blue-600 border border-blue-200 rounded-xl font-bold hover:bg-blue-100 transition-colors text-xs shadow-sm">
                                <i data-lucide="folder-search" size="16"></i>フォルダから探す
                            </button>
                            <button id="createNewFromDriveFlatBtn" class="flex-1 flex items-center justify-center gap-1 py-3 bg-blue-50 text-blue-600 border border-blue-200 rounded-xl font-bold hover:bg-blue-100 transition-colors text-xs shadow-sm">
                                <i data-lucide="list" size="16"></i>全ファイル一覧
                            </button>
                        </div>
                        <!-- ローカルから開く -->
                        <label class="w-full flex items-center justify-center gap-2 py-3 bg-slate-50 text-slate-600 border border-slate-200 rounded-xl font-bold hover:bg-white cursor-pointer transition-colors text-sm shadow-sm">
                            <i data-lucide="folder-open" size="18"></i>ローカルから開く
                            <input type="file" id="newPageFileInput" accept=".json" class="hidden">
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 追加・編集モーダル -->
    <div id="addModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-6 shadow-2xl modal-enter max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-xl font-black text-slate-800 tracking-tight">場所を追加</h2>
                <button id="closeAddModalBtn" class="text-slate-400 hover:text-slate-600 transition-colors"><i data-lucide="x" size="24"></i></button>
            </div>
            <div class="space-y-4">
                
                <div class="bg-blue-50/50 p-3 rounded-2xl border border-blue-100">
                    <div class="flex justify-between items-center mb-1.5 ml-1">
                        <label class="block text-[10px] font-black text-blue-700 uppercase tracking-widest flex items-center gap-1">
                            <i data-lucide="link" size="12"></i> 公式サイト・食べログ等のURL
                        </label>
                        <button type="button" id="generateMetaBtn" class="text-[10px] font-bold bg-blue-600 text-white px-3 py-1.5 rounded-lg hover:bg-blue-700 transition-all flex items-center gap-1 shadow-md shadow-blue-200">
                            <i data-lucide="sparkles" size="12"></i> AI自動入力
                        </button>
                    </div>
                    <div class="relative">
                        <input type="url" id="addUrl" class="w-full pl-4 pr-10 py-3 bg-white border border-blue-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium" placeholder="URLを入力して自動入力ボタンを押す">
                        <button type="button" id="clear_addUrl" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hidden"><i data-lucide="x-circle" size="18"></i></button>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-500 mb-1.5 ml-1 uppercase tracking-widest">タイトル *</label>
                    <div class="relative">
                        <input type="text" id="addTitle" class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-medium text-slate-800" placeholder="例：中華そば 高野">
                        <button type="button" id="clear_addTitle" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hidden"><i data-lucide="x-circle" size="20"></i></button>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-500 mb-1.5 ml-1 uppercase tracking-widest">メモ</label>
                    <div class="relative">
                        <textarea id="addText" rows="4" class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none resize-none leading-relaxed text-sm" placeholder="感想など"></textarea>
                        <button type="button" id="clear_addText" class="absolute right-3 top-4 text-slate-300 hidden"><i data-lucide="x-circle" size="20"></i></button>
                    </div>
                </div>
                
                <div id="addMapArea" class="pt-2">
                    <div class="flex justify-between items-center mb-1.5 ml-1">

    <script>
        // --- Leaflet Icon Fix ---
        delete L.Icon.Default.prototype._getIconUrl;

        // --- State Management ---
        let pages = [];         
        let currentPageId = null; 

        let allMemos = [];
        let currentTag = 'all';
        let searchQuery = '';
        let currentDriveFileId = null; 
        let uploadedImageDataUrl = ''; 
        let editingMemoId = null;
        let viewMode = 'list';
        let leafletMap = null;
        let mapMarkers = [];
        
        let pickerMode = 'linkCurrentFolder'; 

        const apiKey = ""; 
        let userSetGeminiKey = ""; 

        const CONFIG_READY = (typeof CONFIG !== 'undefined' && CONFIG.CLIENT_ID && !CONFIG.CLIENT_ID.includes('YOUR_'));
        const CLIENT_ID = CONFIG_READY ? CONFIG.CLIENT_ID : '';
        const DRIVE_API_KEY = CONFIG_READY ? CONFIG.API_KEY : '';
        const DISCOVERY_DOCS = ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"];
        const SCOPES = "https://www.googleapis.com/auth/drive.file";

        let tokenClient, accessToken = null, gapiInited = false, gisInited = false, actionAfterAuth = null;

        // --- Utils ---
        function hasApiKey() {
            return (userSetGeminiKey && userSetGeminiKey.trim() !== '') || (apiKey && apiKey.trim() !== '');
        }

        function showMsg(message, isError = false) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `px-6 py-3 rounded-full text-sm font-bold shadow-2xl transition-all duration-300 opacity-0 translate-y-4 ${isError ? 'bg-red-600 text-white' : 'bg-slate-800 text-white border border-slate-700'}`;
            toast.textContent = message;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('opacity-0', 'translate-y-4'));
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        function showConfirm(msg, callback) {
            const modal = document.getElementById('confirmModal');
            document.getElementById('confirmMsg').textContent = msg;
            modal.classList.remove('hidden');
            document.getElementById('confirmCancelBtn').onclick = () => modal.classList.add('hidden');
            document.getElementById('confirmOkBtn').onclick = () => {
                modal.classList.add('hidden');
                callback();
            };
        }

        function getProxyImageUrl(url) {
            if (!url) return '';
            if (url.startsWith('data:') || url.startsWith('[')) return url;
            return `https://wsrv.nl/?url=${encodeURIComponent(url)}`;
        }

        function updateApiBtnState() {
            const btn = document.getElementById('openSettingsBtn');
            const hasKey = hasApiKey();
            if (!btn) return;
            if (hasKey) {
                btn.classList.remove('text-slate-400', 'bg-slate-50');
                btn.classList.add('text-blue-600', 'bg-blue-100');
            } else {
                btn.classList.remove('text-blue-600', 'bg-blue-100');
                btn.classList.add('text-slate-400', 'bg-slate-50');
            }

            ['generateMetaBtn', 'generateMapBtn', 'generateImageBtn'].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    if (hasKey) {
                        el.classList.remove('opacity-50', 'cursor-not-allowed', 'saturate-50');
                    } else {
                        el.classList.add('opacity-50', 'cursor-not-allowed', 'saturate-50');
                    }
                }
            });
        }

        function isAuthError(err) {
            if (!err) return false;
            const status = err.status || err.code;
            return status === 401 || status === 403;
        }

        async function clearAuthToken() {
            accessToken = null;
            await idbKeyval.del('gapi_access_token');
            await idbKeyval.del('gapi_token_expiry');
            updateDriveUI();
        }

        async function logout() {
            await clearAuthToken();
            showMsg("ログアウトしました");
        }

        function updateDriveUI() {
            const syncBtn = document.getElementById('driveSyncBtn');
            const syncText = document.getElementById('driveSyncText');
            const iconWrapper = document.getElementById('syncIconWrapper');
            const logoutBtn = document.getElementById('logoutBtn');
            
            if (logoutBtn) logoutBtn.classList.toggle('hidden', !accessToken);
            
            const settingDriveStatus = document.getElementById('settingDriveStatus');
            if (settingDriveStatus) {
                settingDriveStatus.textContent = currentDriveFileId ? "ステータス: 連携中" : "ステータス: 未連携 (ローカルのみ)";
            }
            if (!syncBtn || !syncText || !iconWrapper) return;
            syncBtn.className = "flex items-center gap-2 px-5 py-2.5 rounded-xl font-bold text-sm shadow-lg active:scale-95 transition-all";
            
            if (!accessToken) {
                syncBtn.classList.add('bg-slate-600', 'text-white', 'shadow-slate-200', 'hover:bg-slate-700');
                syncText.textContent = "Drive連携";
                iconWrapper.innerHTML = '<i data-lucide="cloud" size="18"></i>';
            } else if (!currentDriveFileId) {
                syncBtn.classList.add('bg-blue-600', 'text-white', 'shadow-blue-200', 'hover:bg-blue-700');
                syncText.textContent = "Driveを開く";
                iconWrapper.innerHTML = '<i data-lucide="folder-open" size="18"></i>';
            } else {
                syncBtn.classList.add('bg-green-600', 'text-white', 'shadow-green-200', 'hover:bg-green-700');
                syncText.textContent = "同期済み";
                iconWrapper.innerHTML = '<i data-lucide="check-circle" size="18"></i>';
            }
            if (window.lucide) lucide.createIcons();
        }

        function setViewMode(mode) {
            viewMode = mode;
            const btnList = document.getElementById('tabListBtn');
            const btnMap = document.getElementById('tabMapBtn');
            const listContainer = document.getElementById('memoContainer');
            const mapContainer = document.getElementById('mapContainerWrapper');
            if (mode === 'list') {
                btnList.className = "flex-1 sm:flex-none px-6 py-2.5 rounded-xl text-sm font-bold transition-all bg-white text-slate-800 shadow-sm flex items-center justify-center gap-2";
                btnMap.className = "flex-1 sm:flex-none px-6 py-2.5 rounded-xl text-sm font-bold transition-all text-slate-500 hover:text-slate-800 flex items-center justify-center gap-2";
                listContainer.classList.remove('hidden');
                mapContainer.classList.add('hidden');
            } else {
                btnMap.className = "flex-1 sm:flex-none px-6 py-2.5 rounded-xl text-sm font-bold transition-all bg-white text-slate-800 shadow-sm flex items-center justify-center gap-2";
                btnList.className = "flex-1 sm:flex-none px-6 py-2.5 rounded-xl text-sm font-bold transition-all text-slate-500 hover:text-slate-800 flex items-center justify-center gap-2";
                listContainer.classList.add('hidden');
                mapContainer.classList.remove('hidden');
            }
            render();
        }

        function updateMapFeatureVisibility() {
            const page = pages.find(p => p.id === currentPageId);
            const isMapEnabled = page && page.mapEnabled !== false; 

            const viewModeTabs = document.getElementById('viewModeTabs');
            if (viewModeTabs) viewModeTabs.classList.toggle('hidden', !isMapEnabled);
            
            if (!isMapEnabled && viewMode === 'map') setViewMode('list');

            const mapInputArea = document.getElementById('addMapArea');
            if (mapInputArea) mapInputArea.classList.toggle('hidden', !isMapEnabled);
        }

        function renderPageSelect() {
            const select = document.getElementById('pageSelect');
            if (!select) return;
            select.innerHTML = '';
            pages.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = p.name;
                if (p.id === currentPageId) opt.selected = true;
                select.appendChild(opt);
            });
        }

        async function switchPage(pageId) {
            currentPageId = pageId;
            await idbKeyval.set('travel_current_page', currentPageId);
            await loadCurrentPageData();
            render();
            if (currentDriveFileId && accessToken) {
                fetchDriveMemos(currentDriveFileId);
            }
        }

        async function createNewPage(name, driveId = null, initialMemos = [], mapEnabled = true) {
            const newId = 'p-' + Date.now();
            pages.push({ id: newId, name: name, driveFileId: driveId, mapEnabled: mapEnabled });
            await idbKeyval.set('travel_pages', pages);
            await idbKeyval.set(`travelMemos_${newId}`, initialMemos);
            await switchPage(newId);
        }

        async function deleteCurrentPage() {
            if (pages.length <= 1) {
                showMsg("最後のページは削除できません", true);
                return;
            }
            const pageToDelete = pages.find(p => p.id === currentPageId);
            const idToRemove = currentPageId;
            pages = pages.filter(p => p.id !== idToRemove);
            await idbKeyval.del(`travelMemos_${idToRemove}`);
            await idbKeyval.set('travel_pages', pages);
            await switchPage(pages[0].id);
            showMsg(`「${pageToDelete.name}」を削除しました`);
        }

        // --- JSON Helper ---
        function parseTravelJson(jsonObj, defaultName = "") {
            if (Array.isArray(jsonObj)) {
                return { name: defaultName, mapEnabled: true, memos: jsonObj };
            } else if (jsonObj && jsonObj.memos && Array.isArray(jsonObj.memos)) {
                return { 
                    name: jsonObj.pageName || defaultName, 
                    mapEnabled: jsonObj.mapEnabled !== undefined ? jsonObj.mapEnabled : true,
                    memos: jsonObj.memos 
                };
            }
            return { name: defaultName, mapEnabled: true, memos: [] };
        }

        function prepareJsonForExport() {
            const page = pages.find(p => p.id === currentPageId);
            return {
                pageName: page ? page.name : "My Travel",
                mapEnabled: page && page.mapEnabled !== undefined ? page.mapEnabled : true,
                exportDate: new Date().toISOString(),
                memos: allMemos
            };
        }

        // --- AI API ---
        async function safeCallGemini(userQuery, systemInstruction, useSearch = false) {
            const keyToUse = userSetGeminiKey || apiKey || "";
            const modelName = userSetGeminiKey ? "gemini-2.5-flash" : "gemini-2.5-flash-preview-09-2025";
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${keyToUse}`;
            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };
            if (useSearch) {
                payload.tools = [{ "google_search": {} }];
            }
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(endpoint, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (err) {
                    if (i === 4) throw new Error(`通信失敗: ${err.message}`);
                    await new Promise(r => setTimeout(r, delays[i]));
                }
            }
        }

        async function handleAiMetaGeneration() {
            if (!hasApiKey()) {
                showMsg("AI機能を利用するにはAPIキーを設定してください", true);
                document.getElementById('settingsModal').classList.remove('hidden');
                return;
            }
            const url = document.getElementById('addUrl').value.trim();
            const btn = document.getElementById('generateMetaBtn');
            if (!url) {
                showMsg("URLを入力してください。", true);
                return;
            }
            btn.classList.add('btn-loading');
            const originalInner = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader-2" class="animate-spin" size="12"></i> 自動入力中...`;
            if (window.lucide) lucide.createIcons();
            
            const sys = `あなたは情報整理のプロフェッショナルです。提供されたURLをGoogle検索などを用いて分析し、以下のJSON形式で回答してください。
必ずJSONのみ出力してください。
{
  "title": "サイトや場所の正確な名称（ページタイトルから抽出）",
  "memo": "URLの内容に応じた要約テキスト。施設なら【営業時間】【料金】、レストランなら【営業時間】【予約】、レシピなら【材料】【手順の概要】、その他なら一般的な概要を箇条書きなどでわかりやすくまとめること。"
}`;
            const user = `以下のURLについて調べて、情報を抽出してください。\nURL: ${url}`;
            
            try {
                const result = await safeCallGemini(user, sys, true);
                let jsonStr = result?.trim().replace(/```json/gi, '').replace(/```/g, '').trim();
                let data = JSON.parse(jsonStr);
                
                let updated = false;
                if (data && data.title) {
                    document.getElementById('addTitle').value = data.title;
                    document.getElementById('clear_addTitle')?.classList.remove('hidden');
                    updated = true;
                }
                if (data && data.memo) {
                    document.getElementById('addText').value = data.memo;
                    document.getElementById('clear_addText')?.classList.remove('hidden');
                    updated = true;
                }
                if (updated) {
                    showMsg("タイトルとメモを自動入力しました！");
                } else {
                    showMsg("情報が見つかりませんでした", true);
                }
            } catch (err) { 
                showMsg("自動入力に失敗しました", true); 
                console.error(err);
            } finally {
                btn.classList.remove('btn-loading'); 
                btn.innerHTML = originalInner;
                if (window.lucide) lucide.createIcons();
            }
        }

        async function handleAiMapGeneration() {
            if (!hasApiKey()) {
                showMsg("AI機能を利用するにはAPIキーを設定してください", true);
                document.getElementById('settingsModal').classList.remove('hidden');
                return;
            }
            const title = document.getElementById('addTitle').value.trim();
            const url = document.getElementById('addUrl').value.trim();
            const memoText = document.getElementById('addText').value.trim();
            const btn = document.getElementById('generateMapBtn');
            const mapInput = document.getElementById('addMapUrl');
            const latInput = document.getElementById('addLat');
            const lngInput = document.getElementById('addLng');
            if (!title && !memoText && !url) {
                showMsg("タイトル、URL、メモのいずれかを入力してください。", true);
                return;
            }
            btn.classList.add('btn-loading');
            const originalInner = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader-2" class="animate-spin" size="12"></i> 座標特定中...`;
            if (window.lucide) lucide.createIcons();
            const sys = `旅行メモの内容から、Googleマップ検索に最適な場所の名称と、地図にピンを立てるための「緯度(lat)」と「経度(lng)」を特定してください。
必ず以下のJSON形式でのみ出力してください。Markdownの装飾などは一切不要です。
{"keyword": "具体的な地域名と店舗名", "lat": 35.4, "lng": 139.6}`;
            const user = `タイトル: ${title}\nURL: ${url}\nメモ: ${memoText}`;
            try {
                const result = await safeCallGemini(user, sys);
                let jsonStr = result?.trim().replace(/```json/gi, '').replace(/```/g, '').trim();
                let data = JSON.parse(jsonStr);
                if (data && data.keyword) {
                    mapInput.value = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(data.keyword)}`;
                    document.getElementById('clear_addMapUrl')?.classList.remove('hidden');
                    if (data.lat && data.lng) { latInput.value = data.lat; lngInput.value = data.lng; }
                    showMsg("座標を特定しました！");
                }
            } catch (err) { showMsg("特定に失敗しました", true); } finally {
                btn.classList.remove('btn-loading'); btn.innerHTML = originalInner;
                if (window.lucide) lucide.createIcons();
            }
        }

        async function handleAiImageGeneration() {
            if (!hasApiKey()) {
                showMsg("AI機能を利用するにはAPIキーを設定してください", true);
                document.getElementById('settingsModal').classList.remove('hidden');
                return;
            }
            const title = document.getElementById('addTitle').value.trim();
            const url = document.getElementById('addUrl').value.trim();
            const memoText = document.getElementById('addText').value.trim();
            const btn = document.getElementById('generateImageBtn');
            if (!title && !memoText && !url) { showMsg("入力をしてください。", true); return; }
            btn.classList.add('btn-loading');
            const originalInner = btn.innerHTML;

        function processImageFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 800; let w = img.width, h = img.height;
                    if (w > MAX || h > MAX) {
                        if (w > h) { h *= MAX/w; w = MAX; } else { w *= MAX/h; h = MAX; }
                    }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    uploadedImageDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    const prevImg = document.getElementById('imagePreview');
                    if(prevImg) prevImg.src = uploadedImageDataUrl;
                    document.getElementById('previewContainer')?.classList.remove('hidden');
                    const urlIn = document.getElementById('addImageUrl');
                    if(urlIn) urlIn.value = ''; 
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function setupImageLogic() {
            const fileIn = document.getElementById('addImageFile');
            if(fileIn) fileIn.onchange = (e) => processImageFile(e.target.files[0]);
            document.getElementById('clearPreviewBtn').onclick = () => {
                uploadedImageDataUrl = '';
                document.getElementById('previewContainer').classList.add('hidden');
            };
            document.addEventListener('paste', (e) => {
                if (document.getElementById('addModal').classList.contains('hidden')) return;
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                for (let index in items) {
                    const item = items[index];
                    if (item.kind === 'file' && item.type.startsWith('image/')) {
                        processImageFile(item.getAsFile());
                        e.preventDefault(); 
                        break;
                    }
                }
            });
        }

        // ★ エラーに強い読み込み処理
        async function loadPersistedState() {
            try {
                pages = await idbKeyval.get('travel_pages') || [];
                currentPageId = await idbKeyval.get('travel_current_page');
                
                if (!pages || pages.length === 0) {
                    const oldMemos = await idbKeyval.get('travelMemos_cache');
                    const oldDriveId = await idbKeyval.get('driveFileId_cache');
                    pages = [{ id: 'default', name: 'マイノート', driveFileId: oldDriveId || null, mapEnabled: true }];
                    currentPageId = 'default';
                    await idbKeyval.set('travel_pages', pages);
                    await idbKeyval.set('travel_current_page', currentPageId);
                    if (oldMemos) await idbKeyval.set(`travelMemos_default`, oldMemos);
                }
                
                if (!pages.find(p => p.id === currentPageId)) {
                    currentPageId = pages[0].id;
                }
                
                await loadCurrentPageData();
                
                userSetGeminiKey = (await idbKeyval.get('user_gemini_key')) || "";
                document.getElementById('geminiApiKeyInput').value = userSetGeminiKey;
                updateApiBtnState();
                
                // ★ トークンチェック処理の安全化
                accessToken = await idbKeyval.get('gapi_access_token');
                const expiry = await idbKeyval.get('gapi_token_expiry');
                if (accessToken && expiry) {
                    // 数値に変換できない異常値の場合は無視する
                    const expiryTime = parseInt(expiry);
                    if (!isNaN(expiryTime) && Date.now() > expiryTime) {
                        await clearAuthToken(); 
                    }
                }
            } catch (error) {
                console.error("データ読み込み時にエラーが発生しました", error);
                throw error; // 上位のtry-catchに投げる
            }
        }

        async function loadCurrentPageData() {
            const page = pages.find(p => p.id === currentPageId);
            if (!page) return; // 安全策
            currentDriveFileId = page.driveFileId;
            allMemos = (await idbKeyval.get(`travelMemos_${currentPageId}`)) || [];
            updateMapFeatureVisibility();
            renderPageSelect();
            updateDriveUI();
        }

        async function initGoogleServices() {
            if (!CONFIG_READY) return;
            try {
                await new Promise((resolve) => gapi.load('client:picker', resolve));
                await gapi.client.init({ apiKey: DRIVE_API_KEY, discoveryDocs: DISCOVERY_DOCS });
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: SCOPES,
                    callback: async (resp) => {
                        if (resp.error) return;
                        accessToken = resp.access_token;
                        gapi.client.setToken({ access_token: accessToken });
                        await idbKeyval.set('gapi_access_token', accessToken);
                        await idbKeyval.set('gapi_token_expiry', Date.now() + 3550 * 1000); 
                        
                        if (actionAfterAuth === 'picker') showPicker();
                        else if (actionAfterAuth === 'sync') fetchDriveMemos(currentDriveFileId);
                        else if (actionAfterAuth === 'createNewDrivePage') {
                            pickerMode = 'selectFolderForNewPage';
                            showPicker();
                        }
                        actionAfterAuth = null;
                        updateDriveUI();
                    },
                });
                
                if (accessToken) {
                    gapi.client.setToken({ access_token: accessToken });
                    updateDriveUI();
                    if (currentDriveFileId) fetchDriveMemos(currentDriveFileId);
                }
            } catch (err) {
                console.error("GoogleAPI初期化エラー", err);
            }
        }

        function handleSyncClick() {
            if (!accessToken) { 
                actionAfterAuth = 'sync'; 
                if (!currentDriveFileId) pickerMode = 'linkCurrentFolder';
                tokenClient.requestAccessToken({prompt: 'consent'}); 
            }
            else if (!currentDriveFileId) {
                pickerMode = 'linkCurrentFolder';
                handlePickerClick();
            }
            else fetchDriveMemos(currentDriveFileId);
        }

        function handlePickerClick() {
            if (!accessToken) { actionAfterAuth = 'picker'; tokenClient.requestAccessToken({prompt: 'consent'}); }
            else showPicker();
        }

        function showPicker() {
            let view;
            let title = "";
            if (pickerMode === 'selectFolderForNewPage') {
                view = new google.picker.DocsView(google.picker.ViewId.FOLDERS)
                    .setIncludeFolders(true)
                    .setSelectFolderEnabled(true)
                    .setMimeTypes('application/vnd.google-apps.folder');
                title = "保存先フォルダを選択してください";
            } else if (pickerMode === 'linkCurrentFlat' || pickerMode === 'newPageFlat') {
                view = new google.picker.DocsView(google.picker.ViewId.DOCS)
                    .setIncludeFolders(false)
                    .setMimeTypes('application/json');
                title = "旅行メモを選択（全ファイル一覧）";
            } else {
                view = new google.picker.DocsView(google.picker.ViewId.DOCS)
                    .setIncludeFolders(true)
                    .setMimeTypes('application/json');
                title = "旅行メモを選択（フォルダから探す）";
            }

            const picker = new google.picker.PickerBuilder()
                .addView(view)
                .setTitle(title)
                .setOAuthToken(accessToken)
                .setDeveloperKey(DRIVE_API_KEY)
                .setCallback(async (data) => {
                    if (data.action === google.picker.Action.PICKED) {
                        const file = data.docs[0];
                        
                        if (pickerMode === 'selectFolderForNewPage') {
                            const folderId = file.id;
                            const pageName = sessionStorage.getItem('pendingPageName') || '新しい旅行';
                            sessionStorage.removeItem('pendingPageName');
                            await executeCreateNewDrivePage(pageName, folderId);
                        } else if (pickerMode.startsWith('newPage')) {
                            const fileName = file.name.replace('.json', '');
                            document.getElementById('newPageModal').classList.add('hidden');
                            await createNewPage(fileName, file.id, []); 
                            updateDriveUI();
                            fetchDriveMemos(file.id);
                        } else {
                            const page = pages.find(p => p.id === currentPageId);
                            page.driveFileId = file.id;
                            currentDriveFileId = file.id;
                            await idbKeyval.set('travel_pages', pages);
                            document.getElementById('pageSettingsModal').classList.add('hidden');
                            updateDriveUI(); 
                            fetchDriveMemos(file.id);
                        }
                    }
                }).build();
            picker.setVisible(true);
        }

        async function fetchDriveMemos(fileId) {
            const btnText = document.getElementById('driveSyncText');
            const iconWrapper = document.getElementById('syncIconWrapper');
            const syncBtn = document.getElementById('driveSyncBtn');
            if (btnText) btnText.textContent = "同期中...";
            if (iconWrapper) iconWrapper.innerHTML = '<i data-lucide="refresh-cw" size="18" class="animate-spin"></i>';
            if (syncBtn) syncBtn.className = "flex items-center gap-2 px-5 py-2.5 rounded-xl font-bold text-sm shadow-lg bg-green-500 text-white shadow-green-200 transition-all";
            
            try {
                const resp = await gapi.client.drive.files.get({ fileId: fileId, alt: 'media' });
                const result = parseTravelJson(resp.result);
                allMemos = result.memos;
                
                if (result.name || result.mapEnabled !== undefined) {
                    const page = pages.find(p => p.id === currentPageId);
                    let updated = false;
                    
                    if(page && page.name !== result.name && result.name) {
                        page.name = result.name;
                        updated = true;
                    }
                    const incomingMapEnabled = result.mapEnabled !== undefined ? result.mapEnabled : true;
                    if(page && page.mapEnabled !== incomingMapEnabled) {
                        page.mapEnabled = incomingMapEnabled;
                        updated = true;
                    }

                    if (updated) {
                        await idbKeyval.set('travel_pages', pages);
                        renderPageSelect();
                        const settingNameInput = document.getElementById('settingPageName');
                        if (settingNameInput) settingNameInput.value = page.name;
                        const settingMapToggle = document.getElementById('settingMapToggle');
                        if (settingMapToggle) settingMapToggle.checked = page.mapEnabled;
                        updateMapFeatureVisibility();
                    }
                }

                await idbKeyval.set(`travelMemos_${currentPageId}`, allMemos);
                render(); showMsg("同期しました");
            } catch (e) {
                if (isAuthError(e)) {
                    await clearAuthToken();
                    showMsg("セッションが切れました。再ログインしてください。", true);
                } else {
                    showMsg("同期に失敗しました", true);
                }
            } finally { updateDriveUI(); }
        }

        async function pushToDrive() {
            if (!currentDriveFileId || !accessToken) return true;
            try {
                const dataToSave = prepareJsonForExport();
                await gapi.client.request({
                    path: '/upload/drive/v3/files/' + currentDriveFileId,
                    method: 'PATCH', params: { uploadType: 'media' }, body: JSON.stringify(dataToSave, null, 2)
                });
                return true;
            } catch (err) { 
                if (isAuthError(err)) {
                    await clearAuthToken();
                    showMsg("セッションが切れました。再ログインしてください。", true);
                } else {
                    showMsg("保存エラーが発生しました", true);
                }
                return false; 
            }
        }

        async function saveMemo() {
            const titleInput = document.getElementById('addTitle');
            const title = titleInput.value.trim();
            if (!title) {
                showMsg("タイトルを入力してください。", true);
                titleInput.focus();
                return;
            }

            const btn = document.getElementById('saveNewMemoBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader-2" class="animate-spin" size="20"></i> 保存中...`;
            btn.disabled = true;
            if (window.lucide) lucide.createIcons();

            try {
                const urlInputValue = document.getElementById('addImageUrl').value.trim();
                const image = uploadedImageDataUrl || urlInputValue || null;

                const newMemo = {
                    id: editingMemoId || "m-" + Date.now(),
                    title, 
                    url: document.getElementById('addUrl').value.trim(),
                    mapUrl: document.getElementById('addMapUrl').value.trim(),
                    lat: document.getElementById('addLat').value ? parseFloat(document.getElementById('addLat').value) : null,
                    lng: document.getElementById('addLng').value ? parseFloat(document.getElementById('addLng').value) : null,
                    text: document.getElementById('addText').value.trim(),
                    image, 
                    tags: document.getElementById('addTags').value.split(',').map(t => t.trim()).filter(t => t),
                    timestamp: new Date().toISOString()
                };
                if (editingMemoId) {
                    const idx = allMemos.findIndex(m => m.id === editingMemoId); 
                    if (idx > -1) allMemos[idx] = newMemo;
                } else { 
                    allMemos.unshift(newMemo); 
                }
                
                await idbKeyval.set(`travelMemos_${currentPageId}`, allMemos);
                await pushToDrive(); 
                render(); 
                showMsg("保存しました");
                document.getElementById('addModal').classList.add('hidden');
            } catch (err) {
                showMsg("保存に失敗しました", true);
                console.error(err);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                if (window.lucide) lucide.createIcons();
            }
        }

            allMemos = allMemos.filter(m => m.id !== editingMemoId);

            await pushToDrive(); render(); showMsg("削除しました");
            document.getElementById('addModal').classList.add('hidden');

        function getFilteredMemos() {
            return allMemos.filter(m => {
                const textMatch = ((m.title || '') + (m.text || '')).toLowerCase().includes(searchQuery.toLowerCase());
                const tagMatch = currentTag === 'all' || (m.tags && m.tags.includes(currentTag));
                return textMatch && tagMatch;
            });
        }

            };
        };

            Array.from(tags).sort().forEach(tag => {
                const btn = document.createElement('button');

                btn.textContent = tag; btn.onclick = () => { currentTag = tag; render(); };
                tagContainer.appendChild(btn);

                            <div class="flex flex-wrap gap-2 mb-4">
                                ${m.url ? `<button onclick="window.open('${m.url}', '_blank')" class="flex-1 bg-blue-50 text-blue-600 text-[11px] font-black py-2.5 rounded-xl border border-blue-100 flex items-center justify-center gap-1.5 transition-colors"><i data-lucide="globe" size="14"></i>公式サイト</button>` : ''}
                                ${isMapEnabled && m.mapUrl ? `<button onclick="window.open('${m.mapUrl}', '_blank')" class="flex-1 bg-green-50 text-green-600 text-[11px] font-black py-2.5 rounded-xl border border-green-100 flex items-center justify-center gap-1.5 transition-colors"><i data-lucide="map-pin" size="14"></i>マップ表示</button>` : ''}
                                ${m.text ? `<button onclick="window.openMemoModal('${m.id}')" class="flex-1 bg-amber-50 text-amber-600 text-[11px] font-black py-2.5 rounded-xl border border-amber-100 flex items-center justify-center gap-1.5 transition-colors"><i data-lucide="file-text" size="14"></i>メモ詳細</button>` : ''}
                            </div>
                            <div class="flex justify-between items-center pt-4 border-t border-slate-50 mt-auto">
                                <span class="text-[9px] text-slate-300 font-black">${new Date(m.timestamp).toLocaleDateString()}</span>
                                <button onclick="window.editMemo('${m.id}')" class="text-slate-400 p-1"><i data-lucide="pencil" size="16"></i></button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            if (window.lucide) lucide.createIcons();
            if (viewMode === 'map') renderMap();
        }

        function renderMap() {
            if (!leafletMap) {
                leafletMap = L.map('mapView').setView([35.68, 139.76], 5);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '© OSM' }).addTo(leafletMap);
            }
            mapMarkers.forEach(m => leafletMap.removeLayer(m)); mapMarkers = [];
            const filtered = getFilteredMemos();
            let bounds = [];
            filtered.forEach(m => {
                if (m.lat && m.lng) {
                    const marker = L.marker([m.lat, m.lng]).addTo(leafletMap);
                    marker.bindPopup(`<div class="w-48 p-1">
                        <h4 class="font-black text-slate-800 text-sm mb-3">${m.title}</h4>
                        <div class="flex gap-1">
                            ${m.text ? `<button onclick="window.openMemoModal('${m.id}')" class="flex-1 text-[10px] bg-amber-50 text-amber-600 py-1.5 rounded-lg font-bold">メモ</button>` : ''}
                            <button onclick="window.editMemo('${m.id}')" class="flex-1 text-[10px] bg-blue-50 text-blue-600 py-1.5 rounded-lg font-bold">編集</button>
                        </div>
                    </div>`);
                    mapMarkers.push(marker); bounds.push([m.lat, m.lng]);
                }
            });
            if (bounds.length > 0) setTimeout(() => { leafletMap.invalidateSize(); leafletMap.fitBounds(bounds, { padding: [50, 50], maxZoom: 15 }); }, 100);
        }

        window.editMemo = (id) => {
            const memo = allMemos.find(m => m.id === id); if (!memo) return;
            editingMemoId = id; document.getElementById('modalTitle').textContent = '編集';
            document.getElementById('addTitle').value = memo.title || '';
            document.getElementById('addUrl').value = memo.url || '';
            document.getElementById('addMapUrl').value = memo.mapUrl || '';
            document.getElementById('addLat').value = memo.lat || '';
            document.getElementById('addLng').value = memo.lng || '';
            document.getElementById('addText').value = memo.text || '';
            document.getElementById('addTags').value = (memo.tags || []).join(', ');
            if (memo.image) {
                document.getElementById('imagePreview').src = getProxyImageUrl(memo.image);
                document.getElementById('previewContainer').classList.remove('hidden');
                if (memo.image.startsWith('data:')) uploadedImageDataUrl = memo.image;
                else document.getElementById('addImageUrl').value = memo.image;
            } else { document.getElementById('previewContainer').classList.add('hidden'); }
            document.getElementById('deleteMemoBtn').classList.remove('hidden'); 
            renderTagHints(); document.getElementById('addModal').classList.remove('hidden');
        }

        function exportJsonData() {
            if (allMemos.length === 0) return;
            const dataToSave = prepareJsonForExport();
            const fileName = prompt("保存するファイル名を入力してください", `${dataToSave.pageName}.json`);
            if (!fileName) return;
            const finalFileName = fileName.endsWith('.json') ? fileName : `${fileName}.json`;
            const blob = new Blob([JSON.stringify(dataToSave, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = finalFileName;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
            showMsg("エクスポートしました");
        }

        async function createNewDrivePage() {
            const pageName = document.getElementById('newPageName').value.trim() || '新しい旅行';
            sessionStorage.setItem('pendingPageName', pageName);
            if (!accessToken) { actionAfterAuth = 'createNewDrivePage'; tokenClient.requestAccessToken({prompt: 'consent'}); return; }
            pickerMode = 'selectFolderForNewPage';
            showPicker();
        }

        async function executeCreateNewDrivePage(pageName, folderId) {
            try {
                const metadata = { name: pageName + ".json", mimeType: 'application/json' };
                if (folderId) metadata.parents = [folderId];
                
                const content = JSON.stringify({ pageName: pageName, mapEnabled: true, memos: [] }, null, 2);
                const boundary = '-------314159265358979323846';
                const delimiter = "\r\n--" + boundary + "\r\n";
                const multipartRequestBody = delimiter + 'Content-Type: application/json\r\n\r\n' + JSON.stringify(metadata) + delimiter + 'Content-Type: application/json\r\n\r\n' + content + "\r\n--" + boundary + "--";
                
                const request = gapi.client.request({
                    path: '/upload/drive/v3/files', method: 'POST',
                    params: { uploadType: 'multipart' },
                    headers: { 'Content-Type': 'multipart/related; boundary="' + boundary + '"' },
                    body: multipartRequestBody
                });
                
                const resp = await new Promise((resolve, reject) => request.execute(r => r.error ? reject(r.error) : resolve(r)));
                await createNewPage(pageName, resp.id, [], true);
                document.getElementById('newPageModal').classList.add('hidden');
                showMsg("Driveにページを作成しました");
            } catch (err) {
                if (isAuthError(err)) {
                    await clearAuthToken();
                    showMsg("セッションが切れました。再ログインしてください。", true);
                } else {
                    showMsg("作成に失敗しました", true); 
                }
            }
        }

        async function handleSettingFileUpload(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const result = parseTravelJson(JSON.parse(ev.target.result), file.name.replace('.json',''));
                    if(confirm("読み込んだデータで上書きしますか？")) {
                        allMemos = result.memos;
                        const page = pages.find(p => p.id === currentPageId);
                        page.name = result.name;
                        page.mapEnabled = result.mapEnabled !== undefined ? result.mapEnabled : true;
                        
                        await idbKeyval.set(`travelMemos_${currentPageId}`, allMemos);
                        await idbKeyval.set('travel_pages', pages);
                        await pushToDrive(); 
                        
                        document.getElementById('settingPageName').value = page.name;
                        document.getElementById('settingMapToggle').checked = page.mapEnabled;
                        updateMapFeatureVisibility();
                        
                        render(); renderPageSelect();
                        document.getElementById('pageSettingsModal').classList.add('hidden');
                    }
                } catch (err) { showMsg("読み込み失敗", true); }
            };
            reader.readAsText(file);
            e.target.value = '';
        }

        async function handleNewPageFileUpload(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const result = parseTravelJson(JSON.parse(ev.target.result), file.name.replace('.json',''));
                    const incomingMapEnabled = result.mapEnabled !== undefined ? result.mapEnabled : true;
                    await createNewPage(result.name, null, result.memos, incomingMapEnabled);
                    document.getElementById('newPageModal').classList.add('hidden');
                    showMsg("ファイルを新しいページとして読み込みました");
                } catch (err) { showMsg("読み込み失敗", true); }
            };
            reader.readAsText(file);
            e.target.value = '';
        }

        function setupInputClears() {
            ['addTitle', 'addUrl', 'addMapUrl', 'addText', 'addImageUrl', 'addTags'].forEach(id => {
                const input = document.getElementById(id); const btn = document.getElementById(`clear_${id}`);
                if (!input || !btn) return;
                input.oninput = () => btn.classList.toggle('hidden', input.value.length === 0);
                btn.onclick = () => { input.value = ''; btn.classList.add('hidden'); };
            });
        }

        function renderTagHints() {
            const container = document.getElementById('existingTagsContainer'); if(!container) return;
            container.innerHTML = '';
            const tags = new Set(); allMemos.forEach(m => (m.tags || []).forEach(t => tags.add(t)));
            Array.from(tags).sort().forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'px-3 py-1 bg-slate-100 text-slate-500 text-[10px] rounded-xl font-black border border-slate-200';
                btn.textContent = '#' + tag;
                btn.onclick = () => {
                    const input = document.getElementById('addTags');
                    let cur = input.value.split(',').map(t => t.trim()).filter(t => t);
                    if (cur.includes(tag)) cur = cur.filter(t => t !== tag); else cur.push(tag);
                    input.value = cur.join(', ');
                };
                container.appendChild(btn);
            });
        }

        window.openLightbox = (src) => { 
            const img = document.getElementById('lightboxImg'); if(img) img.src = getProxyImageUrl(src); 
            const box = document.getElementById('lightbox'); if(box) box.classList.remove('hidden'); 
        };
        window.addEventListener('load', init);
    </script>
</body>
