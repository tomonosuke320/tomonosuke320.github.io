<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Scrapper Viewer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google API Loader -->
    <script async defer src="https://apis.google.com/js/api.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client"></script>

    <!-- 分離した設定ファイル(config.js)の読み込み -->
    <!-- エラー時に検知できるよう、読み込み確認用のスクリプトを追加 -->
    <script src="config.js" onerror="alert('config.js が見つかりません。同じフォルダにあるか確認してください。')"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #f1f5f9;
        }
        .memo-grid {
            column-count: 1;
            column-gap: 1.5rem;
        }
        @media (min-width: 768px) { .memo-grid { column-count: 2; } }
        @media (min-width: 1024px) { .memo-grid { column-count: 3; } }
        .memo-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-900 pb-20">

    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40 px-4 py-3 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i data-lucide="globe" size="24"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black text-slate-800 tracking-tight">Travel Scrapper</h1>
                    <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest">Web Viewer</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="driveBtn" class="flex items-center gap-2 px-4 py-2 bg-green-50 text-green-700 rounded-xl hover:bg-green-100 transition-all font-bold text-sm opacity-50 shadow-sm">
                    <i data-lucide="database" size="18"></i>
                    <span class="hidden sm:inline">Driveから開く</span>
                </button>
                <label class="flex items-center gap-2 px-4 py-2 bg-slate-800 text-white rounded-xl hover:bg-slate-700 cursor-pointer shadow-md transition-transform active:scale-95 font-bold text-sm">
                    <i data-lucide="upload" size="18"></i>
                    <span class="hidden sm:inline">ファイル読込</span>
                    <input type="file" id="fileInput" accept=".json" class="hidden" />
                </label>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 mt-6">
        <div class="bg-white p-4 md:p-6 rounded-3xl border border-slate-200 shadow-sm flex flex-col gap-4">
            <div class="relative">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size="20"></i>
                <input type="text" id="searchInput" placeholder="場所や内容で検索..." class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all text-base" />
            </div>
            <div id="tagList" class="flex items-center gap-2 overflow-x-auto no-scrollbar py-1">
                <i data-lucide="tag" class="text-slate-400 shrink-0" size="16"></i>
                <button class="tag-chip px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all bg-blue-600 text-white shadow-md shadow-blue-200" data-tag="all">すべて</button>
            </div>
        </div>
    </div>

    <main id="memoContainer" class="max-w-6xl mx-auto px-4 mt-8 memo-grid">
        <div class="col-span-full py-32 flex flex-col items-center text-center px-10">
            <div class="w-20 h-20 bg-blue-50 text-blue-300 rounded-3xl flex items-center justify-center mb-6">
                <i data-lucide="smartphone" size="40"></i>
            </div>
            <h2 class="text-xl font-bold text-slate-700">データが読み込まれていません</h2>
            <p class="text-slate-400 text-sm mt-2 max-w-xs">
                config.js を設定し、Googleドライブから選択してください。
            </p>
        </div>
    </main>

    <button id="fabAdd" class="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-full shadow-lg shadow-blue-300 flex items-center justify-center hover:bg-blue-700 transition-transform active:scale-90 z-50">
        <i data-lucide="plus" size="28"></i>
    </button>

    <!-- モーダル省略(以前と同じ) -->
    <div id="addModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2rem] p-6 shadow-2xl modal-enter max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center mb-6 text-slate-800">
                <h2 class="text-xl font-black">新しいメモを追加</h2>
                <button id="closeAddModalBtn" class="text-slate-400"><i data-lucide="x" size="24"></i></button>
            </div>
            <div class="space-y-4">
                <input type="text" id="addTitle" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="タイトル *">
                <input type="url" id="addUrl" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="URL">
                <textarea id="addText" rows="3" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="メモ"></textarea>
                <input type="url" id="addImage" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="画像URL">
                <input type="text" id="addTags" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="タグ (カンマ区切り)">
                <button id="saveNewMemoBtn" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold">保存してDriveを更新</button>
            </div>
        </div>
    </div>

    <script>
        let allMemos = [];
        let currentTag = 'all';
        let searchQuery = '';
        let currentDriveFileId = null; 

        // config.js の読み込みチェック
        const isConfigValid = () => {
            return typeof CONFIG !== 'undefined' && CONFIG.CLIENT_ID && CONFIG.API_KEY && 
                   !CONFIG.CLIENT_ID.includes('YOUR_') && !CONFIG.API_KEY.includes('YOUR_');
        };

        const CLIENT_ID = typeof CONFIG !== 'undefined' ? CONFIG.CLIENT_ID : '';
        const API_KEY = typeof CONFIG !== 'undefined' ? CONFIG.API_KEY : '';
        const DISCOVERY_DOCS = ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"];
        const SCOPES = "https://www.googleapis.com/auth/drive.file";

        let tokenClient;
        let accessToken = null;
        let gapiInited = false;
        let gisInited = false;

        async function tryInitGoogleApi() {
            if (!isConfigValid()) {
                console.warn("config.js が正しく設定されていません。");
                return;
            }
            try {
                gapi.load('client:picker', async () => {
                    await gapi.client.init({ apiKey: API_KEY, discoveryDocs: DISCOVERY_DOCS });
                    gapiInited = true;
                    checkStatus();
                });
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: SCOPES,
                    callback: async (resp) => {
                        if (resp.error) return;
                        accessToken = resp.access_token;
                        createPicker();
                    },
                });
                gisInited = true;
                checkStatus();
            } catch (err) { console.error(err); }
        }

        function checkStatus() {
            if (gapiInited && gisInited) document.getElementById('driveBtn').classList.remove('opacity-50');
        }

        document.getElementById('driveBtn').onclick = () => {
            if (!isConfigValid()) {
                alert("config.js に CLIENT_ID と API_KEY を正しく設定し、GitHub Pages などのWebサーバー経由で開いてください。");
                return;
            }
            if (!accessToken) tokenClient.requestAccessToken({prompt: 'consent'});
            else createPicker();
        };

        function createPicker() {
            const picker = new google.picker.PickerBuilder()
                .addView(new google.picker.DocsView(google.picker.ViewId.DOCS).setMimeTypes('application/json'))
                .setOAuthToken(accessToken).setDeveloperKey(API_KEY)
                .setCallback(async (data) => {
                    if (data.action === google.picker.Action.PICKED) {
                        currentDriveFileId = data.docs[0].id;
                        const resp = await gapi.client.drive.files.get({ fileId: currentDriveFileId, alt: 'media' });
                        if (Array.isArray(resp.result)) {
                            allMemos = resp.result;
                            render();
                        }
                    }
                }).build();
            picker.setVisible(true);
        }

        // 保存や描画のロジックは以前と同じ（簡略化して継続）
        function render() {
            const container = document.getElementById('memoContainer');
            if (!container) return;
            const filtered = allMemos.filter(m => {
                const matchesTag = currentTag === 'all' || (m.tags && m.tags.includes(currentTag));
                const matchesSearch = ((m.title || '') + (m.text || '')).toLowerCase().includes(searchQuery.toLowerCase());
                return matchesTag && matchesSearch;
            });
            if (allMemos.length > 0) {
                container.innerHTML = filtered.map(m => `
                    <div class="memo-item bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm p-5">
                        ${m.image ? `<img src="${m.image}" class="w-full mb-4 rounded-xl">` : ''}
                        <h3 class="font-bold mb-2">${m.title}</h3>
                        <p class="text-sm text-slate-600 mb-4">${m.text || ''}</p>
                        <a href="${m.url}" target="_blank" class="text-blue-600 text-xs font-bold">🔗 サイトを見る</a>
                    </div>
                `).join('');
            }
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        window.addEventListener('load', () => {
            tryInitGoogleApi();
            if (typeof lucide !== 'undefined') lucide.createIcons();
        });
    </script>
</body>
</html>
