<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Scrapper Viewer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- 大容量データベース（IndexedDB）ライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
    
    <!-- Google API Loader -->
    <script async defer src="https://apis.google.com/js/api.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client"></script>

    <!-- 分離した設定ファイル(config.js)の読み込み -->
    <script src="config.js" onerror="console.warn('config.js が見つかりません。ローカル動作モードで起動します。')"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #f1f5f9;
        }
        .memo-grid {
            column-count: 1;
            column-gap: 1.5rem;
        }
        @media (min-width: 768px) { .memo-grid { column-count: 2; } }
        @media (min-width: 1024px) { .memo-grid { column-count: 3; } }
        .memo-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-enter { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="text-slate-900 pb-20">

    <!-- ナビゲーションバー -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40 px-4 py-3 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i data-lucide="globe" size="24"></i>
                </div>
                <div>
                    <!-- ★ バージョン番号を v1.5.2 に更新 -->
                    <h1 class="text-lg font-black text-slate-800 tracking-tight flex items-center gap-2">
                        Travel Scrapper <span class="text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full border border-slate-200">v1.5.2</span>
                    </h1>
                    <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest">Web Viewer</p>
                </div>
            </div>
            <div class="flex gap-2">
                <!-- データクリア（初期化）ボタン -->
                <button id="clearDataBtn" class="flex items-center gap-2 px-3 py-2 bg-slate-100 text-slate-600 rounded-xl hover:bg-slate-200 font-bold text-sm transition-colors border border-slate-200" title="ローカルデータをクリア（初期化）">
                    <i data-lucide="trash" size="18"></i>
                </button>

                <!-- ログアウトボタン -->
                <button id="logoutBtn" class="hidden flex items-center gap-2 px-3 py-2 bg-red-50 text-red-600 rounded-xl hover:bg-red-100 font-bold text-sm transition-colors border border-red-100" title="ログアウトして認証情報をクリア">
                    <i data-lucide="log-out" size="18"></i>
                </button>

                <!-- Googleドライブボタングループ -->
                <div id="driveBtnGroup" class="flex items-center bg-green-50 text-green-700 rounded-xl shadow-sm opacity-50 transition-all">
                    <button id="driveSyncBtn" class="flex items-center gap-2 px-4 py-2 hover:bg-green-100 rounded-l-xl font-bold text-sm transition-colors" title="Googleドライブと同期">
                        <i data-lucide="refresh-cw" size="18"></i>
                        <span id="driveSyncText" class="hidden sm:inline">Drive同期</span>
                    </button>
                    <div class="w-px bg-green-200 h-6"></div>
                    <button id="drivePickerBtn" class="px-3 py-2 hover:bg-green-100 rounded-r-xl transition-colors" title="別のGoogleドライブファイルを選択" oncontextmenu="event.preventDefault(); resetAuth();">
                        <i data-lucide="folder-search" size="18"></i>
                    </button>
                </div>
                <!-- ローカルファイルボタン -->
                <label class="flex items-center gap-2 px-4 py-2 bg-slate-800 text-white rounded-xl hover:bg-slate-700 cursor-pointer shadow-md transition-transform active:scale-95 font-bold text-sm" title="ローカルファイルを開く">
                    <i data-lucide="upload" size="18"></i>
                    <span class="hidden sm:inline">ファイル読込</span>
                    <input type="file" id="fileInput" accept=".json" class="hidden" />
                </label>
            </div>
        </div>
    </nav>

    <!-- 検索とタグフィルター -->
    <div class="max-w-6xl mx-auto px-4 mt-6">
        <div class="bg-white p-4 md:p-6 rounded-3xl border border-slate-200 shadow-sm flex flex-col gap-4">
            <div class="relative">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size="20"></i>
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="場所や内容で検索..."
                    class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all text-base"
                />
            </div>
            <div id="tagList" class="flex items-center gap-2 overflow-x-auto no-scrollbar py-1">
                <i data-lucide="tag" class="text-slate-400 shrink-0" size="16"></i>
                <button class="tag-chip px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all bg-blue-600 text-white shadow-md shadow-blue-200" data-tag="all">すべて</button>
            </div>
        </div>
    </div>

    <!-- メモ表示エリア -->
    <main id="memoContainer" class="max-w-6xl mx-auto px-4 mt-8 memo-grid">
        <div class="col-span-full py-32 flex flex-col items-center text-center px-10">
            <div class="w-20 h-20 bg-blue-50 text-blue-300 rounded-3xl flex items-center justify-center mb-6">
                <i data-lucide="smartphone" size="40"></i>
            </div>
            <h2 class="text-xl font-bold text-slate-700">データが読み込まれていません</h2>
            <p class="text-slate-400 text-sm mt-2 max-w-xs">右下の「＋」ボタンからメモを追加するか、ファイルを読み込んでください。</p>
        </div>
    </main>

    <!-- フローティングアクションボタン (メモ追加) -->
    <button id="fabAdd" class="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-full shadow-lg shadow-blue-300 flex items-center justify-center hover:bg-blue-700 transition-transform active:scale-90 z-50">
        <i data-lucide="plus" size="28"></i>
    </button>

    <!-- 追加・編集モーダル -->
    <div id="addModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2rem] p-6 shadow-2xl modal-enter max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-xl font-black text-slate-800">新しいメモを追加</h2>
                <button id="closeAddModalBtn" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" size="24"></i></button>
            </div>
            
            <div class="space-y-4">
                <!-- ★ 各入力欄にクリアボタン（x-circle）を追加 -->
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1">タイトル <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <input type="text" id="addTitle" class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="例：絶景カフェ">
                        <button type="button" id="clear_addTitle" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 hidden transition-colors" title="クリア">
                            <i data-lucide="x-circle" size="20"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1">URL (任意)</label>
                    <div class="relative">
                        <input type="url" id="addUrl" class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="https://...">
                        <button type="button" id="clear_addUrl" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 hidden transition-colors" title="クリア">
                            <i data-lucide="x-circle" size="20"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1">メモ (任意)</label>
                    <div class="relative">
                        <textarea id="addText" rows="3" class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="ここに行きたい！"></textarea>
                        <button type="button" id="clear_addText" class="absolute right-3 top-3 text-slate-400 hover:text-slate-600 hidden transition-colors" title="クリア">
                            <i data-lucide="x-circle" size="20"></i>
                        </button>
                    </div>
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1">画像 (URLまたはアップロード)</label>
                    <div class="space-y-2">
                        <div class="relative">
                            <input type="url" id="addImageUrl" class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="画像のURLを入力 (https://...)">
                            <button type="button" id="clear_addImageUrl" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 hidden transition-colors" title="クリア">
                                <i data-lucide="x-circle" size="20"></i>
                            </button>
                        </div>
                        <div class="flex items-center gap-3 pl-1">
                            <span class="text-xs font-bold text-slate-400">または</span>
                            <label class="flex items-center gap-1.5 px-3 py-1.5 bg-slate-100 text-slate-600 rounded-lg cursor-pointer hover:bg-slate-200 transition-colors border border-slate-200 text-xs font-bold">
                                <i data-lucide="image-plus" size="16"></i> ファイルを選択
                                <input type="file" id="addImageFile" accept="image/*" class="hidden">
                            </label>
                            <span id="imageFileName" class="text-xs text-slate-500 truncate max-w-[150px]"></span>
                        </div>
                        
                        <!-- ★ 画像プレビューエリアと画像削除ボタン -->
                        <div id="previewContainer" class="relative hidden mt-2">
                            <img id="imagePreview" src="" class="w-full h-32 object-cover rounded-xl border border-slate-200">
                            <button type="button" id="clearPreviewBtn" class="absolute top-2 right-2 p-1.5 bg-slate-900/50 hover:bg-slate-900/80 text-white rounded-full transition-colors backdrop-blur-sm shadow-md" title="この画像を削除">
                                <i data-lucide="x" size="16"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 ml-1">タグ (カンマ区切りで複数可)</label>
                    <div class="relative">
                        <input type="text" id="addTags" class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="例：カフェ, 絶景">
                        <button type="button" id="clear_addTags" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 hidden transition-colors" title="クリア">
                            <i data-lucide="x-circle" size="20"></i>
                        </button>
                    </div>
                    <div id="existingTagsContainer" class="flex flex-wrap gap-1.5 mt-2 pl-1"></div>
                </div>
                
                <div class="flex gap-2 mt-2">
                    <button id="deleteMemoBtn" type="button" class="hidden px-4 py-4 bg-red-50 text-red-600 rounded-xl font-bold flex items-center justify-center hover:bg-red-100 active:scale-95 transition-all">
                        <i data-lucide="trash-2" size="20"></i>
                    </button>
                    <button id="saveNewMemoBtn" type="button" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-blue-700 active:scale-95 transition-all shadow-md shadow-blue-200 disabled:bg-slate-300">
                        <i data-lucide="save" size="20"></i>
                        <span id="saveBtnText">追加</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 画像拡大用ライトボックス -->
    <div id="lightbox" class="fixed inset-0 z-[100] hidden bg-black/95 flex items-center justify-center p-4 cursor-zoom-out" onclick="this.classList.add('hidden')">
        <img id="lightboxImg" src="" class="max-w-full max-h-full rounded shadow-2xl" />
        <button class="absolute top-6 right-6 text-white p-2 bg-white/10 rounded-full hover:bg-white/20"><i data-lucide="x" size="32"></i></button>
    </div>

    <script>
        let allMemos = [];
        let currentTag = 'all';
        let searchQuery = '';
        let currentDriveFileId = null; 
        let uploadedImageDataUrl = ''; 
        let editingMemoId = null;

        const isConfigValid = () => {
            return typeof CONFIG !== 'undefined' && CONFIG.CLIENT_ID && CONFIG.API_KEY && 
                   !CONFIG.CLIENT_ID.includes('YOUR_') && !CONFIG.API_KEY.includes('YOUR_');
        };

        const CLIENT_ID = typeof CONFIG !== 'undefined' ? CONFIG.CLIENT_ID : '';
        const API_KEY = typeof CONFIG !== 'undefined' ? CONFIG.API_KEY : '';
        const DISCOVERY_DOCS = ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"];
        const SCOPES = "https://www.googleapis.com/auth/drive";

        let tokenClient;
        let accessToken = null;
        let gapiInited = false;
        let gisInited = false;
        let actionAfterAuth = null;

        // ★ 入力欄のクリア（×）ボタンの設定
        function setupClearButtons() {
            const fields = ['addTitle', 'addUrl', 'addText', 'addImageUrl', 'addTags'];
            fields.forEach(id => {
                const input = document.getElementById(id);
                const btn = document.getElementById(`clear_${id}`);
                if (!input || !btn) return;

                // 入力がある時だけ×ボタンを表示
                input.addEventListener('input', () => {
                    btn.classList.toggle('hidden', input.value.length === 0);
                });

                // ×ボタンを押したときの処理
                btn.addEventListener('click', () => {
                    input.value = '';
                    btn.classList.add('hidden');
                    
                    if (id === 'addImageUrl') {
                        // URLを消した時、アップロード画像がなければプレビューも消す
                        if (!uploadedImageDataUrl) {
                            document.getElementById('previewContainer').classList.add('hidden');
                            document.getElementById('imagePreview').src = '';
                        }
                    } else if (id === 'addTags') {
                        // タグを消したら、青色になっていた候補ボタンの色もリセット
                        updateTagChipStyles();
                    }
                    
                    input.focus(); // 消した後にすぐ入力できるようにフォーカスを当てる
                });
            });
        }

        // モーダルを開いた時に×ボタンの表示状態を一括更新する
        function updateClearButtonsVisibility() {
            const fields = ['addTitle', 'addUrl', 'addText', 'addImageUrl', 'addTags'];
            fields.forEach(id => {
                const input = document.getElementById(id);
                const btn = document.getElementById(`clear_${id}`);
                if (input && btn) {
                    btn.classList.toggle('hidden', input.value.length === 0);
                }
            });
        }

        // プレビュー画像の「削除」ボタンの処理
        document.getElementById('clearPreviewBtn').onclick = () => {
            document.getElementById('addImageUrl').value = '';
            document.getElementById('addImageFile').value = '';
            document.getElementById('imageFileName').textContent = '';
            uploadedImageDataUrl = '';
            document.getElementById('previewContainer').classList.add('hidden');
            document.getElementById('imagePreview').src = '';
            
            const clearUrlBtn = document.getElementById('clear_addImageUrl');
            if (clearUrlBtn) clearUrlBtn.classList.add('hidden');
        };

        // データの完全クリア機能
        async function clearAllData() {
            if(!confirm("【警告】ローカルのキャッシュ（一時データ）をすべて消去して、アプリを初期状態に戻しますか？\n※Googleドライブ上のファイルは消えません。")) return;
            allMemos = [];
            currentDriveFileId = null;
            await idbKeyval.del('travelMemos_cache');
            await idbKeyval.del('driveFileId_cache');
            render();
            updateDriveButtonState();
            alert("データを初期化しました。");
        }
        document.getElementById('clearDataBtn').onclick = clearAllData;

        // ログアウト処理
        async function logout() {
            if(!confirm("ログアウトして認証情報をクリアしますか？")) return;
            await idbKeyval.del('gapi_access_token');
            await idbKeyval.del('gapi_token_expiry');
            accessToken = null;
            location.reload(); 
        }
        document.getElementById('logoutBtn').onclick = logout;

        async function loadToken() {
            try {
                const saved = await idbKeyval.get('gapi_access_token');
                const expiry = await idbKeyval.get('gapi_token_expiry');
                if (saved && expiry && Date.now() < parseInt(expiry)) { accessToken = saved; }
                else { accessToken = null; }
            } catch (e) { console.error(e); }
        }

        async function saveToken(token) {
            accessToken = token;
            await idbKeyval.set('gapi_access_token', token);
            await idbKeyval.set('gapi_token_expiry', Date.now() + 3000 * 1000); // 約50分
            updateDriveButtonState();
        }

        async function loadCache() {
            try {
                const cachedMemos = await idbKeyval.get('travelMemos_cache');
                if (cachedMemos) { allMemos = cachedMemos; }
                currentDriveFileId = await idbKeyval.get('driveFileId_cache');
                updateDriveButtonState();
                if (allMemos.length > 0) render();
            } catch(e) { console.error(e); }
        }

        async function saveCache() {
            await idbKeyval.set('travelMemos_cache', allMemos);
            if (currentDriveFileId) { await idbKeyval.set('driveFileId_cache', currentDriveFileId); }
            else { await idbKeyval.del('driveFileId_cache'); }
            updateDriveButtonState();
        }

        function updateDriveButtonState() {
            const syncText = document.getElementById('driveSyncText');
            const logoutBtn = document.getElementById('logoutBtn');

            if (syncText) {
                if (currentDriveFileId) { syncText.textContent = "Drive同期"; }
                else { syncText.textContent = "Driveを開く"; }
            }

            if (logoutBtn) {
                if (accessToken) { logoutBtn.classList.remove('hidden'); }
                else { logoutBtn.classList.add('hidden'); }
            }
        }

        async function tryInitGoogleApi() {
            if (!isConfigValid()) return;
            try {
                if (typeof gapi !== 'undefined') {
                    gapi.load('client:picker', async () => {
                        await gapi.client.init({ apiKey: API_KEY, discoveryDocs: DISCOVERY_DOCS });
                        gapiInited = true; checkStatus();
                    });
                }
                if (typeof google !== 'undefined' && google.accounts) {
                    tokenClient = google.accounts.oauth2.initTokenClient({
                        client_id: CLIENT_ID, scope: SCOPES,
                        callback: async (resp) => {
                            if (resp.error) { resetSyncButton(); return; }
                            await saveToken(resp.access_token);
                            executeDriveAction();
                        },
                    });
                    gisInited = true; checkStatus();
                }
            } catch (err) { console.error(err); }
        }

        function checkStatus() {
            if (gapiInited && gisInited) document.getElementById('driveBtnGroup').classList.remove('opacity-50');
        }

        function resetSyncButton() {
            const btn = document.getElementById('driveSyncBtn');
            if (btn) {
                btn.innerHTML = `<i data-lucide="refresh-cw" size="18"></i><span id="driveSyncText" class="hidden sm:inline">Drive同期</span>`;
            }
            if (typeof lucide !== 'undefined') lucide.createIcons();
            updateDriveButtonState();
        }

        document.getElementById('driveSyncBtn').onclick = async () => {
            actionAfterAuth = currentDriveFileId ? 'sync' : 'picker';
            await loadToken();
            if (!accessToken) { tokenClient.requestAccessToken({prompt: 'consent'}); }
            else { executeDriveAction(); }
        };

        document.getElementById('drivePickerBtn').onclick = async () => {
            actionAfterAuth = 'picker';
            await loadToken();
            if (!accessToken) { tokenClient.requestAccessToken({prompt: 'consent'}); }
            else { executeDriveAction(); }
        };

        function executeDriveAction() {
            if (actionAfterAuth === 'picker') createPicker();
            else if (actionAfterAuth === 'sync') fetchDriveData(currentDriveFileId);
        }

        function createPicker() {
            const picker = new google.picker.PickerBuilder()
                .addView(new google.picker.DocsView(google.picker.ViewId.DOCS).setMimeTypes('application/json'))
                .setOAuthToken(accessToken).setDeveloperKey(API_KEY)
                .setCallback(async (data) => {
                    if (data.action === google.picker.Action.PICKED) {
                        currentDriveFileId = data.docs[0].id; 
                        await saveCache(); fetchDriveData(currentDriveFileId); 
                    }
                }).build();
            picker.setVisible(true);
        }

        async function fetchDriveData(fileId) {
            const btn = document.getElementById('driveSyncBtn');
            if (btn) {
                btn.innerHTML = `<i data-lucide="refresh-cw" class="animate-spin" size="18"></i><span id="driveSyncText" class="hidden sm:inline">同期中...</span>`;
            }
            if (typeof lucide !== 'undefined') lucide.createIcons();
            
            try {
                if (gapi.client) gapi.client.setToken({ access_token: accessToken });
                
                const resp = await gapi.client.drive.files.get({ fileId: fileId, alt: 'media' });
                let data = resp.result;
                
                if (typeof data === 'string') {
                    try { 
                        data = JSON.parse(data); 
                    } catch(e) { 
                        throw new Error("JSON_PARSE_ERROR"); 
                    }
                }
                
                if (Array.isArray(data)) {
                    allMemos = data; 
                    currentDriveFileId = fileId;
                    await saveCache(); 
                    render();
                } else {
                    throw new Error("INVALID_FORMAT");
                }
            } catch (e) {
                console.error("Fetch Error Detail:", e);
                const status = e.status || (e.result && e.result.error && e.result.error.code) || e.code;
                const msg = e.message || (e.result && e.result.error && e.result.error.message) || String(e);

                if (status === 401 || status === 403) {
                    await idbKeyval.del('gapi_access_token');
                    accessToken = null;
                    alert(`【認証エラー】\n安全のためログアウトしました。\n再度ログインし、権限のチェックボックスにチェックを入れてください。`);
                } else if (status === 404) {
                    alert("【重要】ファイルが見つかりません！\n\n別のアカウントでログインしたか、ファイルが削除された可能性があります。\n右側の「フォルダアイコン」を押して、再度ファイルを選択し直してください。");
                    currentDriveFileId = null;
                    await saveCache();
                } else { 
                    alert(`同期エラーが発生しました。\nステータス: ${status}`); 
                }
            } finally { 
                resetSyncButton(); 
            }
        }

        async function updateDriveFile() {
            if (!currentDriveFileId || !accessToken) return false;
            const content = JSON.stringify(allMemos, null, 2);
            try {
                if (gapi.client) gapi.client.setToken({ access_token: accessToken });
                const request = gapi.client.request({
                    path: '/upload/drive/v3/files/' + currentDriveFileId,
                    method: 'PATCH', params: { uploadType: 'media' }, body: content
                });
                await new Promise((resolve, reject) => {
                    request.execute(resp => {
                        if (resp && resp.error) reject(resp.error);
                        else resolve(resp);
                    });
                });
                return true;
            } catch (err) {
                console.error("Drive upload failed", err);
                const status = err.code || err.status;
                if (status === 401 || status === 403) {
                    await idbKeyval.del('gapi_access_token');
                    accessToken = null;
                    alert("【保存権限エラー(HTTP " + status + ")】\n\nGoogleドライブのファイルを書き換える権限がありませんでした。\n\nお手数ですが一度「ログアウト(赤いボタン)」を押し、再ログインする際に『Google ドライブのすべてのファイルの表示、編集、作成、削除』のチェックボックスに必ずチェックを入れてください！");
                } else if (status === 404) {
                    alert("保存先ファイルが見つかりません。フォルダアイコンから選び直してください。");
                    currentDriveFileId = null;
                    await saveCache();
                } else {
                    alert("保存に失敗しました: " + (err.message || "不明なエラー"));
                }
                return false;
            }
        }

        // ファイルアップロード時にプレビューを表示
        document.getElementById('addImageFile').onchange = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 800; let w = img.width, h = img.height;
                    if (w > h && w > MAX) { h *= MAX/w; w = MAX; } else if (h > MAX) { w *= MAX/h; h = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    uploadedImageDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('imagePreview').src = uploadedImageDataUrl;
                    document.getElementById('previewContainer').classList.remove('hidden');
                    
                    document.getElementById('addImageUrl').value = '';
                    document.getElementById('clear_addImageUrl').classList.add('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        // URL入力時にプレビューを表示
        document.getElementById('addImageUrl').addEventListener('input', (e) => {
            const url = e.target.value.trim();
            if (url) {
                document.getElementById('imagePreview').src = url;
                document.getElementById('previewContainer').classList.remove('hidden');
                uploadedImageDataUrl = '';
                document.getElementById('addImageFile').value = '';
                document.getElementById('imageFileName').textContent = '';
            } else {
                if (!uploadedImageDataUrl) {
                    document.getElementById('previewContainer').classList.add('hidden');
                    document.getElementById('imagePreview').src = '';
                }
            }
        });

        function renderExistingTagsInModal() {
            const container = document.getElementById('existingTagsContainer');
            container.innerHTML = '';
            const tags = new Set(); allMemos.forEach(m => (m.tags || []).forEach(t => tags.add(t)));
            Array.from(tags).sort().forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'px-3 py-1 bg-slate-100 text-slate-500 text-xs rounded-lg font-bold border border-slate-200';
                btn.textContent = '#' + tag;
                btn.onclick = () => {
                    const input = document.getElementById('addTags');
                    let cur = input.value.split(',').map(t => t.trim()).filter(t => t.length > 0);
                    if (cur.includes(tag)) cur = cur.filter(t => t !== tag); else cur.push(tag);
                    input.value = cur.join(', ');
                    updateTagChipStyles();
                    updateClearButtonsVisibility(); // ×ボタンの表示を更新
                };
                container.appendChild(btn);
            });
            updateTagChipStyles();
        }

        function updateTagChipStyles() {
            const input = document.getElementById('addTags');
            if(!input) return;
            const currentTags = input.value.split(',').map(t => t.trim()).filter(t => t.length > 0);
            const btns = document.getElementById('existingTagsContainer').querySelectorAll('button');
            
            btns.forEach(btn => {
                const tag = btn.textContent.replace('#', '');
                if (currentTags.includes(tag)) {
                    btn.classList.remove('bg-slate-100', 'text-slate-500', 'border-slate-200');
                    btn.classList.add('bg-blue-100', 'text-blue-600', 'border-blue-300');
                } else {
                    btn.classList.remove('bg-blue-100', 'text-blue-600', 'border-blue-300');
                    btn.classList.add('bg-slate-100', 'text-slate-500', 'border-slate-200');
                }
            });
        }
        document.getElementById('addTags').addEventListener('input', updateTagChipStyles);

        document.getElementById('fabAdd').onclick = () => {
            editingMemoId = null; 
            document.getElementById('modalTitle').textContent = '新しいメモを追加';
            document.getElementById('saveBtnText').textContent = '追加';
            document.getElementById('addTitle').value = ''; document.getElementById('addUrl').value = '';
            document.getElementById('addText').value = ''; document.getElementById('addTags').value = '';
            document.getElementById('addImageUrl').value = '';
            document.getElementById('addImageFile').value = '';
            uploadedImageDataUrl = '';
            
            document.getElementById('previewContainer').classList.add('hidden');
            document.getElementById('imagePreview').src = '';
            
            document.getElementById('deleteMemoBtn').classList.add('hidden'); 
            renderExistingTagsInModal();
            updateClearButtonsVisibility();
            document.getElementById('addModal').classList.remove('hidden');
        };

        window.editMemo = (id) => {
            const memo = allMemos.find(m => m.id === id); if (!memo) return;
            editingMemoId = id; 
            document.getElementById('modalTitle').textContent = 'メモを編集';
            document.getElementById('saveBtnText').textContent = '上書き保存';
            document.getElementById('addTitle').value = memo.title || '';
            document.getElementById('addUrl').value = memo.url || '';
            document.getElementById('addText').value = memo.text || '';
            document.getElementById('addTags').value = (memo.tags || []).join(', ');
            
            document.getElementById('addImageUrl').value = '';
            document.getElementById('addImageFile').value = '';
            uploadedImageDataUrl = '';

            if (memo.image) {
                if (memo.image.startsWith('http')) {
                    document.getElementById('addImageUrl').value = memo.image;
                } else {
                    uploadedImageDataUrl = memo.image;
                }
                document.getElementById('imagePreview').src = memo.image;
                document.getElementById('previewContainer').classList.remove('hidden');
            } else { 
                document.getElementById('previewContainer').classList.add('hidden'); 
                document.getElementById('imagePreview').src = '';
            }
            document.getElementById('deleteMemoBtn').classList.remove('hidden'); 
            renderExistingTagsInModal();
            updateClearButtonsVisibility();
            document.getElementById('addModal').classList.remove('hidden');
        };

        document.getElementById('saveNewMemoBtn').onclick = async () => {
            const btn = document.getElementById('saveNewMemoBtn');
            const btnText = document.getElementById('saveBtnText');
            const title = document.getElementById('addTitle').value.trim();
            if (!title) return alert("タイトルは必須です");

            btn.disabled = true;
            const originalText = btnText.textContent;
            btnText.textContent = '保存中...';

            const newMemo = {
                id: editingMemoId || "m-" + Date.now(),
                url: document.getElementById('addUrl').value,
                title: title, text: document.getElementById('addText').value,
                image: uploadedImageDataUrl || document.getElementById('addImageUrl').value.trim() || (editingMemoId && !uploadedImageDataUrl && document.getElementById('addImageUrl').value.trim()==='' && document.getElementById('previewContainer').classList.contains('hidden')===false ? allMemos.find(m=>m.id===editingMemoId).image : null),
                tags: document.getElementById('addTags').value.split(',').map(t => t.trim()).filter(t => t.length > 0),
                timestamp: new Date().toISOString()
            };
            
            // もし画像プレビューが明示的に消されていたら image は空にする
            if(document.getElementById('previewContainer').classList.contains('hidden')){
                newMemo.image = null;
            }

            const oldMemos = [...allMemos];
            if (editingMemoId) {
                const idx = allMemos.findIndex(m => m.id === editingMemoId);
                allMemos[idx] = newMemo;
            } else { allMemos.unshift(newMemo); }
            
            let success = true;
            if (currentDriveFileId && accessToken) { success = await updateDriveFile(); }

            if (success) {
                await saveCache();
                document.getElementById('addModal').classList.add('hidden');
                render();
            } else {
                allMemos = oldMemos;
            }
            btn.disabled = false; btnText.textContent = originalText;
        };

        function render() {
            const container = document.getElementById('memoContainer');
            const filtered = allMemos.filter(m => {
                const matchesTag = currentTag === 'all' || (m.tags && m.tags.includes(currentTag));
                const matchesSearch = ((m.title || '') + (m.text || '')).toLowerCase().includes(searchQuery.toLowerCase());
                return matchesTag && matchesSearch;
            });
            if (allMemos.length === 0) { container.innerHTML = `<div class="col-span-full py-32 text-center text-slate-400">データがありません</div>`; return; }
            container.innerHTML = filtered.map(m => `
                <div class="memo-item bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm flex flex-col">
                    ${m.image ? `<img src="${m.image}" class="w-full h-auto cursor-zoom-in block" onclick="openLightbox('${m.image}')">` : ''}
                    <div class="p-5 flex-1 flex flex-col">
                        <h3 class="font-bold text-slate-800 mb-3">${m.title}</h3>
                        ${m.text ? `<div class="bg-blue-50/50 text-blue-800 text-sm p-3.5 rounded-2xl italic mb-4 whitespace-pre-wrap">${m.text}</div>` : ''}
                        <div class="flex flex-wrap gap-1.5 mb-4">
                            ${(m.tags || []).map(t => `<span class="px-2 py-0.5 bg-slate-100 text-slate-500 text-[10px] rounded">#${t}</span>`).join('')}
                        </div>
                        <div class="flex justify-between items-center pt-4 border-t border-slate-50 mt-auto">
                            <button onclick="editMemo('${m.id}')" class="text-slate-400 hover:text-blue-600"><i data-lucide="pencil" size="16"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
            const tags = new Set(); allMemos.forEach(m => (m.tags || []).forEach(t => tags.add(t)));
            document.querySelectorAll('.dynamic-tag').forEach(c => c.remove());
            Array.from(tags).sort().forEach(tag => {
                const btn = document.createElement('button');
                btn.className = `dynamic-tag px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap ${currentTag === tag ? 'bg-blue-600 text-white shadow-md' : 'bg-white border border-slate-200 text-slate-500'}`;
                btn.textContent = tag; btn.onclick = () => { currentTag = tag; render(); };
                document.getElementById('tagList').appendChild(btn);
            });
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        document.getElementById('searchInput').oninput = (e) => { searchQuery = e.target.value; render(); };
        document.querySelector('[data-tag="all"]').onclick = () => { currentTag = 'all'; render(); };
        document.getElementById('closeAddModalBtn').onclick = () => document.getElementById('addModal').classList.add('hidden');
        window.openLightbox = (src) => { document.getElementById('lightboxImg').src = src; document.getElementById('lightbox').classList.remove('hidden'); };

        window.addEventListener('load', async () => {
            setupClearButtons();
            await loadToken(); await loadCache(); tryInitGoogleApi();
            if (typeof lucide !== 'undefined') lucide.createIcons();
        });
    </script>
</body>
</html>
