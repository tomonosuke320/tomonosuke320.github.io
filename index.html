<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Scrapper</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2003/svg' viewBox='0 0 24 24' fill='none' stroke='%232563eb' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z'/></svg>">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- IndexedDB Library -->
    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
    <!-- Google API Loader -->
    <script async defer src="https://apis.google.com/js/api.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client"></script>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- config.js -->
    <script src="config.js" onerror="console.warn('config.js が見つかりません。')"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }
        .memo-grid { column-count: 1; column-gap: 1.5rem; }
        @media (min-width: 768px) { .memo-grid { column-count: 2; } }
        @media (min-width: 1024px) { .memo-grid { column-count: 3; } }
        .memo-item { break-inside: avoid; margin-bottom: 1.5rem; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-enter { animation: fadeIn 0.2s ease-out forwards; }
        .btn-loading { pointer-events: none; opacity: 0.7; }

        /* Leaflet Pop-up */
        .leaflet-popup-content-wrapper { border-radius: 1rem; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); padding: 0; }
        .leaflet-popup-content { margin: 12px; }
        #mapView { height: calc(100vh - 280px); min-height: 400px; width: 100%; border-radius: 1.5rem; z-index: 10; }
    </style>
</head>
<body class="text-slate-900 pb-20">

    <!-- トースト通知エリア -->
    <div id="toastContainer" class="fixed bottom-20 left-1/2 transform -translate-x-1/2 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <!-- カスタム確認ダイアログ -->
    <div id="confirmModal" class="fixed inset-0 z-[200] hidden flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4">
        <div class="bg-white rounded-[2rem] p-6 max-w-xs w-full shadow-2xl modal-enter">
            <p id="confirmMsg" class="text-slate-800 font-black mb-6 text-center text-sm leading-relaxed"></p>
            <div class="flex gap-3">
                <button id="confirmCancelBtn" class="flex-1 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-xs hover:bg-slate-200 transition-colors">キャンセル</button>
                <button id="confirmOkBtn" class="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold text-xs hover:bg-red-600 shadow-lg shadow-red-200 transition-colors">OK</button>
            </div>
        </div>
    </div>

    <!-- ナビゲーションバー -->
    <nav class="bg-white/90 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-200 rotate-[-10deg]">
                        <i data-lucide="send" size="26"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-black text-slate-800 tracking-tight leading-none mb-1">Travel Scrapper</h1>
                        <p class="text-[10px] text-blue-600 font-bold uppercase tracking-[0.2em]">Web Viewer v3.5 Perfect</p>
                    </div>
                </div>

                <div class="flex items-center gap-1.5">
                    <button id="openSettingsBtn" class="p-2 transition-colors rounded-xl text-slate-400 bg-slate-50 hover:scale-105" title="AI機能の設定">
                        <i data-lucide="bot" size="20"></i>
                    </button>
                    <!-- Drive同期ボタン -->
                    <button id="driveSyncBtn" class="flex items-center gap-2 px-5 py-2.5 bg-slate-600 text-white rounded-xl font-bold text-sm shadow-lg shadow-slate-200 hover:bg-slate-700 active:scale-95 transition-all">
                        <span id="syncIconWrapper" class="inline-block"><i data-lucide="cloud" size="18"></i></span>
                        <span id="driveSyncText">Drive連携</span>
                    </button>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-2">
                <div class="flex items-center gap-1 p-1 bg-slate-50 rounded-xl border border-slate-100">
                    <button id="drivePickerBtn" class="flex items-center gap-1.5 px-3 py-2 text-green-700 font-bold text-xs hover:bg-white rounded-lg transition-colors">
                        <i data-lucide="folder-open" size="16"></i><span>選択</span>
                    </button>
                    <div class="w-px h-4 bg-slate-200"></div>
                    <label for="fileInput" class="flex items-center gap-1.5 px-3 py-2 text-slate-600 font-bold text-xs hover:bg-white rounded-lg transition-colors cursor-pointer">
                        <i data-lucide="file-up" size="16"></i><span>読込</span>
                    </label>
                    <input type="file" id="fileInput" accept=".json" class="hidden" />
                </div>
                <div class="flex-1"></div>
                <div class="flex items-center gap-1">
                    <button id="logoutBtn" class="hidden flex items-center gap-1.5 px-3 py-2 text-red-600 font-bold text-xs hover:bg-red-50 rounded-lg transition-colors">
                        <i data-lucide="log-out" size="16"></i><span>ログアウト</span>
                    </button>
                    <button id="clearDataBtn" class="flex items-center gap-1.5 px-3 py-2 text-slate-400 font-bold text-xs hover:text-red-500 rounded-lg transition-colors">
                        <i data-lucide="trash-2" size="16"></i><span>初期化</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 検索バー & タブ切り替え -->
    <div class="max-w-6xl mx-auto px-4 mt-6">
        <div class="bg-white p-4 md:p-6 rounded-3xl border border-slate-200 shadow-sm flex flex-col gap-4">
            
            <div class="flex gap-2 p-1 bg-slate-100 rounded-2xl w-full sm:w-auto self-start">
                <button id="tabListBtn" class="flex-1 sm:flex-none px-6 py-2.5 rounded-xl text-sm font-bold transition-all bg-white text-slate-800 shadow-sm flex items-center justify-center gap-2">
                    <i data-lucide="layout-grid" size="16"></i>リスト
                </button>
                <button id="tabMapBtn" class="flex-1 sm:flex-none px-6 py-2.5 rounded-xl text-sm font-bold transition-all text-slate-500 hover:text-slate-800 flex items-center justify-center gap-2">
                    <i data-lucide="map" size="16"></i>マップ
                </button>
            </div>

            <div class="relative">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size="20"></i>
                <input type="text" id="searchInput" placeholder="保存した場所を検索..." class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-500/10 outline-none transition-all text-base shadow-inner" />
            </div>
            
            <div id="tagList" class="flex items-center gap-2 overflow-x-auto no-scrollbar py-1">
                <i data-lucide="tag" class="text-slate-400 shrink-0" size="16"></i>
                <button class="tag-chip px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all bg-blue-600 text-white" data-tag="all">すべて</button>
            </div>
        </div>
    </div>

    <!-- メイン表示 (リスト表示用) -->
    <main id="memoContainer" class="max-w-6xl mx-auto px-4 mt-8 memo-grid">
        <div class="col-span-full py-32 flex flex-col items-center text-center px-10 text-slate-400">
            <i data-lucide="plane" size="48" class="mb-4 opacity-20"></i>
            <p>同期中、またはデータがありません</p>
        </div>
    </main>

    <!-- メイン表示 (マップ表示用) -->
    <div id="mapContainerWrapper" class="max-w-6xl mx-auto px-4 mt-8 hidden">
        <div id="mapView" class="border border-slate-200 shadow-sm overflow-hidden"></div>
        <p class="text-xs text-slate-400 font-medium text-center mt-3">
            ※マップに表示されない場所は、編集から「場所を正確に推察」ボタンを押し直して保存してください。
        </p>
    </div>

    <!-- 追加ボタン -->
    <button id="fabAdd" class="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-full shadow-lg shadow-blue-300 flex items-center justify-center hover:bg-blue-700 active:scale-90 transition-transform z-50">
        <i data-lucide="plus" size="28"></i>
    </button>

    <!-- 追加・編集モーダル -->
    <div id="addModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-6 shadow-2xl modal-enter max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-xl font-black text-slate-800 tracking-tight">場所を追加</h2>
                <button id="closeAddModalBtn" class="text-slate-400 hover:text-slate-600 transition-colors"><i data-lucide="x" size="24"></i></button>
            </div>
            <div class="space-y-4">
                
                <div class="bg-blue-50/50 p-3 rounded-2xl border border-blue-100">
                    <label class="block text-[10px] font-black text-blue-700 mb-1.5 ml-1 uppercase tracking-widest flex items-center gap-1">
                        <i data-lucide="link" size="12"></i> 公式サイト・食べログ等のURL
                    </label>
                    <div class="relative">
                        <input type="url" id="addUrl" class="w-full pl-4 pr-10 py-3 bg-white border border-blue-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium" placeholder="ここに入力すると正確に場所を特定できます">
                        <button type="button" id="clear_addUrl" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hidden"><i data-lucide="x-circle" size="18"></i></button>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-500 mb-1.5 ml-1 uppercase tracking-widest">タイトル *</label>
                    <div class="relative">
                        <input type="text" id="addTitle" class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-medium text-slate-800" placeholder="例：中華そば 高野">
                        <button type="button" id="clear_addTitle" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hidden"><i data-lucide="x-circle" size="20"></i></button>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-500 mb-1.5 ml-1 uppercase tracking-widest">メモ</label>
                    <div class="relative">
                        <textarea id="addText" rows="3" class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none resize-none leading-relaxed text-sm" placeholder="感想など"></textarea>
                        <button type="button" id="clear_addText" class="absolute right-3 top-4 text-slate-300 hidden"><i data-lucide="x-circle" size="20"></i></button>
                    </div>
                </div>
                
                <div class="pt-2">
                    <div class="flex justify-between items-center mb-1.5 ml-1">
                        <label class="block text-[10px] font-black text-green-600 uppercase tracking-widest flex items-center gap-1">
                            <i data-lucide="map-pin" size="12"></i> Googleマップ表示用
                        </label>
                        <button type="button" id="generateMapBtn" class="text-[10px] font-bold bg-green-100 text-green-700 px-3 py-1.5 rounded-lg hover:bg-green-200 transition-all flex items-center gap-1 shadow-sm shadow-green-50">
                            <i data-lucide="sparkles" size="12"></i> 場所を正確に推察
                        </button>
                    </div>
                    <div class="relative">
                        <input type="url" id="addMapUrl" class="w-full pl-4 pr-10 py-3 bg-green-50/50 border border-green-100 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none text-sm text-green-800 font-medium" placeholder="タイトルやURLから正確な場所を探します">
                        <button type="button" id="clear_addMapUrl" class="absolute right-3 top-1/2 -translate-y-1/2 text-green-300 hidden"><i data-lucide="x-circle" size="18"></i></button>
                    </div>
                    <!-- マップピン用の隠しフィールド -->
                    <input type="hidden" id="addLat" value="">
                    <input type="hidden" id="addLng" value="">
                </div>

                <div class="pt-2 border-t border-slate-100">
                    <div class="flex justify-between items-center mb-1.5 ml-1 pt-2">
                        <label class="block text-xs font-black text-slate-500 uppercase tracking-widest flex items-center gap-1">
                            画像 <span class="text-[9px] font-medium text-slate-400 normal-case">(ペーストで一発登録)</span>
                        </label>
                        <!-- ★ 単純に検索を開くだけのボタン -->
                        <button type="button" id="generateImageBtn" class="text-[10px] font-bold bg-indigo-600 text-white px-3 py-1.5 rounded-lg hover:bg-indigo-700 transition-all flex items-center gap-1 shadow-md shadow-indigo-200">
                            <i data-lucide="search" size="12"></i> 画像検索を開く
                        </button>
                    </div>
                    
                    <div class="space-y-3">
                        <div class="relative">
                            <input type="url" id="addImageUrl" class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="URL入力 または 画像をコピーしてここにペースト">
                            <button type="button" id="clear_addImageUrl" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hidden"><i data-lucide="x-circle" size="20"></i></button>
                        </div>
                        
                        <div class="flex items-center gap-3 pl-1">
                            <span class="text-[10px] font-bold text-slate-300 uppercase">Or</span>
                            <label class="flex items-center gap-2 px-4 py-2 bg-white text-slate-600 rounded-xl cursor-pointer hover:bg-slate-50 border border-slate-200 text-xs font-bold shadow-sm transition-colors">
                                <i data-lucide="upload" size="16"></i> ファイルから選ぶ
                                <input type="file" id="addImageFile" accept="image/*" class="hidden">
                            </label>
                        </div>
                        
                        <div id="previewContainer" class="relative hidden">
                            <img id="imagePreview" src="" class="w-full h-40 object-cover rounded-2xl border border-slate-200 shadow-sm" onerror="this.onerror=null; this.parentElement.classList.add('hidden');">
                            <button type="button" id="clearPreviewBtn" class="absolute top-2 right-2 p-1.5 bg-slate-900/60 text-white rounded-full backdrop-blur-sm shadow-lg"><i data-lucide="x" size="16"></i></button>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-500 mb-1.5 ml-1 uppercase tracking-widest">タグ</label>
                    <div class="relative mb-2">
                        <input type="text" id="addTags" class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="カフェ, グルメ">
                        <button type="button" id="clear_addTags" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hidden"><i data-lucide="x-circle" size="20"></i></button>
                    </div>
                    <div id="existingTagsContainer" class="flex flex-wrap gap-2 pl-1"></div>
                </div>

                <div class="flex gap-3 pt-4 border-t border-slate-100">
                    <button id="deleteMemoBtn" type="button" class="hidden px-5 py-4 bg-red-50 text-red-500 rounded-2xl font-bold hover:bg-red-100 transition-colors"><i data-lucide="trash-2" size="20"></i></button>
                    <button id="saveNewMemoBtn" type="button" class="flex-1 py-4 bg-slate-800 text-white rounded-2xl font-black flex items-center justify-center gap-2 hover:bg-slate-900 active:scale-95 transition-all shadow-lg"><i data-lucide="save" size="20"></i><span id="saveBtnText">保存する</span></button>
                </div>
            </div>
        </div>
    </div>

    <!-- AI設定モーダル -->
    <div id="settingsModal" class="fixed inset-0 z-[70] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 shadow-2xl modal-enter">
            <h2 class="text-lg font-black text-slate-800 mb-4 flex items-center gap-2">
                <i data-lucide="bot" size="24" class="text-blue-600"></i> AIアシスタント設定
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-black text-slate-500 mb-1.5 uppercase tracking-widest">Gemini API Key</label>
                    <input type="password" id="geminiApiKeyInput" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="AI Studioのキーを入力">
                </div>
                
                <div class="p-4 bg-blue-50 rounded-xl text-sm border border-blue-100">
                    <p class="font-bold text-blue-800 mb-2 flex items-center gap-1.5">
                        <i data-lucide="key" size="16"></i> APIキーの取得手順 (無料)
                    </p>
                    <ol class="list-decimal list-inside text-blue-700 space-y-1.5 text-xs font-medium">
                        <li><a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-blue-600 underline font-bold hover:text-blue-800">Google AI Studio</a> にアクセス</li>
                        <li>Googleアカウントでログイン</li>
                        <li>青い「Create API key」ボタンを押す</li>
                        <li>生成された文字列をコピーして上に貼り付け</li>
                    </ol>
                </div>

                <div class="pt-2 flex flex-col gap-2">
                    <button id="saveSettingsBtn" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-colors shadow-lg shadow-blue-200">設定を保存</button>
                    <button id="closeSettingsBtn" class="w-full py-3 text-slate-400 font-bold text-sm hover:bg-slate-50 rounded-xl transition-colors">閉じる</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ライトボックス -->
    <div id="lightbox" class="fixed inset-0 z-[100] hidden bg-black/95 flex items-center justify-center p-4 cursor-zoom-out" onclick="this.classList.add('hidden')">
        <img id="lightboxImg" src="" class="max-w-full max-h-full rounded shadow-2xl transition-transform duration-300" />
    </div>

    <script>
        // --- Leaflet Icon Fix ---
        delete L.Icon.Default.prototype._getIconUrl;
        L.Icon.Default.mergeOptions({
            iconRetinaUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-icon-2x.png',
            iconUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-icon.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
        });

        // --- State Management ---
        let allMemos = [];
        let currentTag = 'all';
        let searchQuery = '';
        let currentDriveFileId = null; 
        let uploadedImageDataUrl = ''; 
        let editingMemoId = null;
        let viewMode = 'list';
        let leafletMap = null;
        let mapMarkers = [];

        // --- Config & API ---
        const apiKey = ""; // Canvas Provides Key automatically
        let userSetGeminiKey = ""; 

        const CONFIG_READY = (typeof CONFIG !== 'undefined' && CONFIG.CLIENT_ID && !CONFIG.CLIENT_ID.includes('YOUR_'));
        const CLIENT_ID = CONFIG_READY ? CONFIG.CLIENT_ID : '';
        const DRIVE_API_KEY = CONFIG_READY ? CONFIG.API_KEY : '';
        const DISCOVERY_DOCS = ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"];
        const SCOPES = "https://www.googleapis.com/auth/drive.file";

        let tokenClient, accessToken = null, gapiInited = false, gisInited = false, actionAfterAuth = null;

        // --- Utils ---
        function showMsg(message, isError = false) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `px-6 py-3 rounded-full text-sm font-bold shadow-2xl transition-all duration-300 opacity-0 translate-y-4 ${isError ? 'bg-red-600 text-white' : 'bg-slate-800 text-white border border-slate-700'}`;
            toast.textContent = message;
            container.appendChild(toast);
            
            requestAnimationFrame(() => toast.classList.remove('opacity-0', 'translate-y-4'));
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        function showConfirm(msg, callback) {
            const modal = document.getElementById('confirmModal');
            document.getElementById('confirmMsg').textContent = msg;
            modal.classList.remove('hidden');
            
            document.getElementById('confirmCancelBtn').onclick = () => modal.classList.add('hidden');
            document.getElementById('confirmOkBtn').onclick = () => {
                modal.classList.add('hidden');
                callback();
            };
        }

        function getProxyImageUrl(url) {
            if (!url) return '';
            if (url.startsWith('data:') || url.startsWith('[')) return url;
            return `https://wsrv.nl/?url=${encodeURIComponent(url)}`;
        }

        function updateApiBtnState() {
            const btn = document.getElementById('openSettingsBtn');
            if (!btn) return;
            if (userSetGeminiKey) {
                btn.classList.remove('text-slate-400', 'bg-slate-50');
                btn.classList.add('text-blue-600', 'bg-blue-100');
            } else {
                btn.classList.remove('text-blue-600', 'bg-blue-100');
                btn.classList.add('text-slate-400', 'bg-slate-50');
            }
        }

        function updateDriveUI() {
            const syncBtn = document.getElementById('driveSyncBtn');
            const syncText = document.getElementById('driveSyncText');
            const iconWrapper = document.getElementById('syncIconWrapper');
            const logoutBtn = document.getElementById('logoutBtn');

            if (logoutBtn) logoutBtn.classList.toggle('hidden', !accessToken);

            if (!syncBtn || !syncText || !iconWrapper) return;

        // ★ 完全な安定性を誇る v2.6ベースのAI通信ロジック + 確実なリトライ
        async function safeCallGemini(userQuery, systemInstruction) {
            const keyToUse = userSetGeminiKey || apiKey || "";
            const modelName = userSetGeminiKey ? "gemini-2.5-flash" : "gemini-2.5-flash-preview-09-2025";
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${keyToUse}`;
            
            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };

            const delays = [1000, 2000, 4000, 8000, 16000];
            
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error ${response.status}`);
                    }

                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (err) {
                    if (i === 4) throw new Error("通信に失敗しました。時間をおいてお試しください。");
                    await new Promise(r => setTimeout(r, delays[i]));
                }
            }
        }

        // ★ マップ推察 (エラーの起きないテキストベース + 座標の安全な取得)
        async function handleAiMapGeneration() {
            const title = document.getElementById('addTitle').value.trim();
            const url = document.getElementById('addUrl').value.trim();
            const memoText = document.getElementById('addText').value.trim();
            const btn = document.getElementById('generateMapBtn');
            const mapInput = document.getElementById('addMapUrl');
            const latInput = document.getElementById('addLat');
            const lngInput = document.getElementById('addLng');

            if (!title && !memoText && !url) {
                showMsg("タイトル、URL、メモのいずれかを入力してください。", true);
                return;
            }

            btn.classList.add('btn-loading');
            const originalInner = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader-2" class="animate-spin" size="12"></i> 場所を特定中...`;
            if (window.lucide) lucide.createIcons();

            // 安定していたv2.6と同じプロンプトに戻し、JSONエラーを根絶
            const sys = `旅行メモの内容から、Googleマップ検索に最適な場所の名称を1つ特定してください。出力は「検索キーワードのみ」とし、挨拶などは一切不要です。`;
            const user = `タイトル: ${title}\nURL: ${url}\nメモ: ${memoText}`;

            try {
                const result = await safeCallGemini(user, sys);
                // AIの返答からキーワードだけを抽出
                const keyword = result?.trim().replace(/[*#`\n\{\}"]/g, '');

                if (keyword && keyword.length > 0 && keyword.length < 100) {
                    mapInput.value = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(keyword)}`;
                    document.getElementById('clear_addMapUrl')?.classList.remove('hidden');
                    
                    // JSONパースのエラーを避けるため、座標は安全な正規表現かデフォルトで空にする
                    latInput.value = "";
                    lngInput.value = "";

                    // AIからの不安定なJSON抽出をやめ、正規表現で確実に座標を抜き出す（もしAIが気を利かせて出した場合）
                    const latMatch = result.match(/"lat":\s*([0-9.]+)/);
                    const lngMatch = result.match(/"lng":\s*([0-9.]+)/);
                    if(latMatch && lngMatch) {
                        latInput.value = latMatch[1];
                        lngInput.value = lngMatch[1];
                    }

                    showMsg("場所を特定しました！");
                } else {
                    showMsg("場所を特定できませんでした。", true);
                }
            } catch (err) {
                showMsg(err.message, true);
            } finally {
                btn.classList.remove('btn-loading');
                btn.innerHTML = originalInner;
                if (window.lucide) lucide.createIcons();
            }
        }

        // --- Image File & Paste Handling ---
        function processImageFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 800; let w = img.width, h = img.height;
                    if (w > h && w > MAX) { h *= MAX/w; w = MAX; } else if (h > MAX) { w *= MAX/h; h = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    uploadedImageDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    
                    const prevImg = document.getElementById('imagePreview');
                    if(prevImg) prevImg.src = uploadedImageDataUrl;
                    
                    const prevCont = document.getElementById('previewContainer');
                    if(prevCont) prevCont.classList.remove('hidden');
                    
                    const urlIn = document.getElementById('addImageUrl');
                    if(urlIn) {
                        urlIn.value = ''; 
                        document.getElementById('clear_addImageUrl')?.classList.add('hidden');
                    }
                    showMsg("画像を読み込みました (ペースト成功)");
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function setupImageLogic() {
            const fileIn = document.getElementById('addImageFile');
            if(fileIn) fileIn.onchange = (e) => {
                processImageFile(e.target.files[0]);
            };

            const clearPrev = document.getElementById('clearPreviewBtn');
            if(clearPrev) clearPrev.onclick = () => {
                uploadedImageDataUrl = '';
                const prev = document.getElementById('previewContainer');
                if(prev) prev.classList.add('hidden');
                document.getElementById('addImageUrl').value = '';
            };
            
            const urlInput = document.getElementById('addImageUrl');
            if(urlInput) {
                urlInput.addEventListener('input', (e) => {
                    const url = e.target.value.trim();
                    const prevCont = document.getElementById('previewContainer');
                    const imgPreview = document.getElementById('imagePreview');
                    if (url && (url.startsWith('http') || url.startsWith('['))) {
                        uploadedImageDataUrl = '';
                        imgPreview.src = getProxyImageUrl(url);
                        prevCont.classList.remove('hidden');
                    } else if (!uploadedImageDataUrl) {
                        prevCont.classList.add('hidden');
                    }
                });
            }

            document.addEventListener('paste', (e) => {
                if (document.getElementById('addModal').classList.contains('hidden')) return;
                
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                for (let index in items) {
                    const item = items[index];
                    if (item.kind === 'file' && item.type.startsWith('image/')) {
                        const file = item.getAsFile();
                        processImageFile(file);
                        e.preventDefault(); 
                        break;
                    }
                }
            });
        }

        async function loadPersistedState() {
            const cachedMemos = await idbKeyval.get('travelMemos_cache');
            if (cachedMemos) allMemos = cachedMemos;
            currentDriveFileId = await idbKeyval.get('driveFileId_cache');

            updateApiBtnState();

            accessToken = await idbKeyval.get('gapi_access_token');
            const expiry = await idbKeyval.get('gapi_token_expiry');
            if (expiry && Date.now() > parseInt(expiry)) {
                accessToken = null;
                await idbKeyval.del('gapi_access_token');
                await idbKeyval.del('gapi_token_expiry');
            }
        }

        async function initGoogleServices() {
            if (!CONFIG_READY) return;
            try {
                await new Promise((resolve) => gapi.load('client', resolve));
                await gapi.client.init({ apiKey: DRIVE_API_KEY, discoveryDocs: DISCOVERY_DOCS });
                gapiInited = true;

                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: SCOPES,
                    callback: async (resp) => {
                        if (resp.error) { actionAfterAuth = null; return; }
                        await persistToken(resp.access_token);
                        if (actionAfterAuth === 'picker') showPicker();
                        else if (actionAfterAuth === 'sync') fetchDriveMemos(currentDriveFileId);
                        actionAfterAuth = null;
                    },
                });
                gisInited = true;

                if (accessToken) {
                    gapi.client.setToken({ access_token: accessToken });
                    updateDriveUI();
                    if (currentDriveFileId) fetchDriveMemos(currentDriveFileId);
                }
            } catch (err) { console.error("GAPI Init Fail", err); }
        }

        // --- Auth & Sync ---
        async function persistToken(token) {
            accessToken = token;
            gapi.client.setToken({ access_token: token });
            await idbKeyval.set('gapi_access_token', token);
            await idbKeyval.set('gapi_token_expiry', Date.now() + 3550 * 1000); 
            updateDriveUI();
        }

        async function logout() {
            accessToken = null;
            await idbKeyval.del('gapi_access_token');
            await idbKeyval.del('gapi_token_expiry');
            updateDriveUI();
            location.reload();
        }

        function handleSyncClick() {
            if (!accessToken) { actionAfterAuth = 'sync'; tokenClient.requestAccessToken({prompt: 'consent'}); }
            else if (!currentDriveFileId) { handlePickerClick(); }
            else { fetchDriveMemos(currentDriveFileId); }
        }

        function handlePickerClick() {
            if (!accessToken) { actionAfterAuth = 'picker'; tokenClient.requestAccessToken({prompt: 'consent'}); }
            else showPicker();
        }

        function showPicker() {
            const picker = new google.picker.PickerBuilder()
                .addView(new google.picker.DocsView(google.picker.ViewId.DOCS).setMimeTypes('application/json'))
                .setOAuthToken(accessToken).setDeveloperKey(DRIVE_API_KEY)
                .setCallback(async (data) => {
                    if (data.action === google.picker.Action.PICKED) {
                        currentDriveFileId = data.docs[0].id; 
                        await idbKeyval.set('driveFileId_cache', currentDriveFileId);
                        updateDriveUI();
                        fetchDriveMemos(currentDriveFileId); 
                    }
                }).build();
            picker.setVisible(true);
        }

        async function fetchDriveMemos(fileId) {
            const btnText = document.getElementById('driveSyncText');
            const iconWrapper = document.getElementById('syncIconWrapper');
            const syncBtn = document.getElementById('driveSyncBtn');
            
            if (btnText) btnText.textContent = "同期中...";
            if (iconWrapper) iconWrapper.innerHTML = '<i data-lucide="refresh-cw" size="18" class="animate-spin"></i>';
            if (syncBtn) syncBtn.className = "flex items-center gap-2 px-5 py-2.5 rounded-xl font-bold text-sm shadow-lg bg-green-500 text-white shadow-green-200 transition-all";
            if (window.lucide) lucide.createIcons();
            
            try {
                const resp = await gapi.client.drive.files.get({ fileId: fileId, alt: 'media' });
                let data = resp.result;
                if (typeof data === 'string') data = JSON.parse(data);
                if (Array.isArray(data)) {
                    allMemos = data;
                    await idbKeyval.set('travelMemos_cache', allMemos);
                    render();
                    showMsg("Driveから同期しました");
                }
            } catch (e) {
                if (e.status === 401 || e.status === 403) {
                    accessToken = null; 
                    showMsg("再ログインが必要です。チェックボックスを忘れずに。", true);
                }
            } finally {
                updateDriveUI();
            }
        }

        async function pushToDrive() {
            if (!currentDriveFileId || !accessToken) return true;
            try {
                const request = gapi.client.request({
                    path: '/upload/drive/v3/files/' + currentDriveFileId,
                    method: 'PATCH', params: { uploadType: 'media' }, body: JSON.stringify(allMemos, null, 2)
                });
                await new Promise((resolve, reject) => request.execute(r => {
                    if (r && r.error) reject(r.error);
                    else resolve(r);
                }));
                return true;
            } catch (err) {
                if (err.code === 403 || err.status === 403) {
                    showMsg("保存権限エラー：再ログインし「すべてのファイルの表示...」にチェックを入れてください。", true);
                    accessToken = null; updateDriveUI();
                } else {
                    showMsg("同期エラーが発生しました", true);
                }
                return false;
            }
        }

        async function saveMemo() {
            const titleInput = document.getElementById('addTitle');
            const title = titleInput.value.trim();
            if (!title) { titleInput.focus(); return; }

            const btn = document.getElementById('saveNewMemoBtn');
            const btnText = document.getElementById('saveBtnText');
            btn.disabled = true; if(btnText) btnText.textContent = '保存中...';

            const preview = document.getElementById('previewContainer');
            const image = (preview && !preview.classList.contains('hidden')) 
                        ? (uploadedImageDataUrl || document.getElementById('addImageUrl').value.trim()) : null;

            const latStr = document.getElementById('addLat').value;
            const lngStr = document.getElementById('addLng').value;

            const newMemo = {
                id: editingMemoId || "m-" + Date.now(),
                title: title,
                url: document.getElementById('addUrl').value.trim(),
                mapUrl: document.getElementById('addMapUrl').value.trim(),
                lat: latStr ? parseFloat(latStr) : null,
                lng: lngStr ? parseFloat(lngStr) : null,
                text: document.getElementById('addText').value.trim(),
                image: image,
                tags: document.getElementById('addTags').value.split(',').map(t => t.trim()).filter(t => t),
                timestamp: new Date().toISOString()
            };

            const oldMemos = [...allMemos];
            if (editingMemoId) {
                const idx = allMemos.findIndex(m => m.id === editingMemoId);
                if (idx > -1) allMemos[idx] = newMemo;
            } else {
                allMemos.unshift(newMemo);
            }
            
            let success = true;
            if (currentDriveFileId && accessToken) {
                const syncBtnText = document.getElementById('driveSyncText');
                const syncIconWrapper = document.getElementById('syncIconWrapper');
                const syncBtn = document.getElementById('driveSyncBtn');
                if(syncBtnText) syncBtnText.textContent = "保存中...";
                if(syncIconWrapper) syncIconWrapper.innerHTML = '<i data-lucide="refresh-cw" size="18" class="animate-spin"></i>';
                if (syncBtn) syncBtn.className = "flex items-center gap-2 px-5 py-2.5 rounded-xl font-bold text-sm shadow-lg bg-green-500 text-white shadow-green-200 transition-all";
                if (window.lucide) lucide.createIcons();

                success = await pushToDrive();
                updateDriveUI(); 
            }

            if (success) {
                await idbKeyval.set('travelMemos_cache', allMemos);
                document.getElementById('addModal').classList.add('hidden');
                render();
                showMsg("保存しました");
            } else {
                allMemos = oldMemos;
            }
            btn.disabled = false; if(btnText) btnText.textContent = editingMemoId ? '上書き保存' : '追加する';
        }

        async function deleteMemo() {
            const old = [...allMemos];

            if (currentDriveFileId && accessToken) {

        function getFilteredMemos() {

                const tagMatch = currentTag === 'all' || (m.tags && m.tags.includes(currentTag));
                return textMatch && tagMatch;

                    <div class="p-5 flex-1 flex flex-col">
                        <h3 class="font-black text-slate-800 mb-3 text-base leading-snug">${m.title}</h3>
                        ${m.text ? `<div class="bg-blue-50/40 text-blue-900 text-[13px] p-4 rounded-2xl mb-4 whitespace-pre-wrap leading-relaxed shadow-inner font-medium">${m.text}</div>` : ''}
                        <div class="flex flex-wrap gap-1.5 mb-5">${(m.tags || []).map(t => `<span class="px-2.5 py-1 bg-slate-100 text-slate-500 text-[10px] rounded-lg font-black uppercase">#${t}</span>`).join('')}</div>
                        
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${m.url ? `
                            <button onclick="window.open('${m.url}', '_blank')" class="flex-1 min-w-[90px] bg-blue-50 text-blue-600 text-[11px] font-black py-2.5 rounded-xl border border-blue-100 hover:bg-blue-100 flex items-center justify-center gap-1.5 transition-colors">
                                <i data-lucide="globe" size="14"></i>公式サイト
                            </button>` : ''}
                            ${m.mapUrl ? `
                            <button onclick="window.open('${m.mapUrl}', '_blank')" class="flex-1 min-w-[90px] bg-green-50 text-green-600 text-[11px] font-black py-2.5 rounded-xl border border-green-100 hover:bg-green-100 flex items-center justify-center gap-1.5 transition-colors">
                                <i data-lucide="map-pin" size="14"></i>マップ表示
                            </button>` : ''}
                        </div>

                        <div class="flex justify-between items-center pt-4 border-t border-slate-50 mt-auto">
                            <span class="text-[9px] text-slate-300 font-black uppercase tracking-tighter">${m.timestamp ? new Date(m.timestamp).toLocaleDateString() : ''}</span>
                            <button onclick="window.editMemo('${m.id}')" class="text-slate-400 hover:text-blue-600 transition-colors p-1"><i data-lucide="pencil" size="16"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');

            if (window.lucide) lucide.createIcons();
        }

        function renderMap() {
            if (!leafletMap) {
                leafletMap = L.map('mapView').setView([35.681236, 139.767125], 5);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors'
                }).addTo(leafletMap);
            }

            mapMarkers.forEach(m => leafletMap.removeLayer(m));
            mapMarkers = [];

            const filtered = getFilteredMemos();
            let bounds = [];

            filtered.forEach(m => {
                if (m.lat && m.lng) {
                    const marker = L.marker([m.lat, m.lng]).addTo(leafletMap);
                    
                    const popupHtml = `
                        <div class="w-48 p-1">
                            ${m.image ? `<img src="${getProxyImageUrl(m.image)}" class="w-full h-28 object-cover rounded-xl mb-3 shadow-sm border border-slate-100" onerror="this.onerror=null; this.style.display='none';">` : ''}
                            <h4 class="font-black text-slate-800 text-sm mb-3 leading-snug">${m.title}</h4>
                            <div class="flex gap-2">
                                <button onclick="window.editMemo('${m.id}')" class="flex-1 text-[10px] bg-blue-50 text-blue-600 py-1.5 rounded-lg font-bold border border-blue-100 hover:bg-blue-100 transition-colors">編集</button>
                                ${m.mapUrl ? `<a href="${m.mapUrl}" target="_blank" class="flex-1 text-[10px] bg-green-50 text-green-600 py-1.5 rounded-lg font-bold border border-green-100 hover:bg-green-100 transition-colors block text-center">経路</a>` : ''}
                            </div>
                        </div>
                    `;
                    marker.bindPopup(popupHtml);
                    mapMarkers.push(marker);
                    bounds.push([m.lat, m.lng]);
                }
            });

            if (bounds.length > 0) {
                setTimeout(() => {
                    leafletMap.invalidateSize();
                    leafletMap.fitBounds(bounds, { padding: [50, 50], maxZoom: 15 });
                }, 100);
            } else {
                setTimeout(() => leafletMap.invalidateSize(), 100);
            }
        }

        window.editMemo = (id) => {
            const memo = allMemos.find(m => m.id === id); if (!memo) return;
            editingMemoId = id;
            document.getElementById('modalTitle').textContent = '編集';
            const saveText = document.getElementById('saveBtnText');
            if(saveText) saveText.textContent = '上書き保存';
            document.getElementById('addTitle').value = memo.title || '';
            document.getElementById('addUrl').value = memo.url || '';
            document.getElementById('addMapUrl').value = memo.mapUrl || '';
            document.getElementById('addLat').value = memo.lat || '';
            document.getElementById('addLng').value = memo.lng || '';
            document.getElementById('addText').value = memo.text || '';
            document.getElementById('addTags').value = (memo.tags || []).join(', ');
            
            uploadedImageDataUrl = '';
            const preview = document.getElementById('previewContainer');
            const imgPreview = document.getElementById('imagePreview');
            const imgUrl = document.getElementById('addImageUrl');
            
            if (memo.image) {
                if(imgPreview) imgPreview.src = getProxyImageUrl(memo.image);
                if(preview) preview.classList.remove('hidden');
                if (memo.image.startsWith('data:')) uploadedImageDataUrl = memo.image;
                else if(imgUrl) imgUrl.value = memo.image;
            } else { 
                if(preview) preview.classList.add('hidden'); 
            }
            
            const delBtn = document.getElementById('deleteMemoBtn');
            if(delBtn) delBtn.classList.remove('hidden'); 
            renderTagHints(); 
            document.getElementById('addModal').classList.remove('hidden');
            refreshClearBtns();
        }

        // --- Helpers ---
        function setupInputClears() {
            ['addTitle', 'addUrl', 'addMapUrl', 'addText', 'addImageUrl', 'addTags'].forEach(id => {
                const input = document.getElementById(id);
                const btn = document.getElementById(`clear_${id}`);
                if (!input || !btn) return;
                input.oninput = () => btn.classList.toggle('hidden', input.value.length === 0);
                btn.onclick = () => { input.value = ''; btn.classList.add('hidden'); input.focus(); if(id==='addTags') refreshTagHintStyles(); };
            });
        }

        function refreshClearBtns() {
            ['addTitle', 'addUrl', 'addMapUrl', 'addText', 'addImageUrl', 'addTags'].forEach(id => {
                const el = document.getElementById(id);
                const btn = document.getElementById('clear_'+id);
                if(el && btn) btn.classList.toggle('hidden', el.value.length === 0);
            });
        }

        function refreshFilterTags() {
            const tags = new Set(); allMemos.forEach(m => (m.tags || []).forEach(t => tags.add(t)));
            document.querySelectorAll('.dynamic-tag').forEach(c => c.remove());
            const list = document.getElementById('tagList');
            if(!list) return;
            Array.from(tags).sort().forEach(tag => {
                const btn = document.createElement('button');
                btn.className = `dynamic-tag px-5 py-2 rounded-full text-[11px] font-black transition-all ${currentTag === tag ? 'bg-blue-600 text-white shadow-lg shadow-blue-100' : 'bg-white border border-slate-200 text-slate-500 hover:border-blue-300'}`;
                btn.textContent = tag; btn.onclick = () => { currentTag = tag; render(); };
                list.appendChild(btn);
            });
        }

        function renderTagHints() {
            const container = document.getElementById('existingTagsContainer');
            if(!container) return;
            container.innerHTML = '';
            const tags = new Set(); allMemos.forEach(m => (m.tags || []).forEach(t => tags.add(t)));
            Array.from(tags).sort().forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'px-3 py-1 bg-slate-100 text-slate-500 text-[10px] rounded-xl font-black border border-slate-200 hover:bg-slate-200 transition-colors';
                btn.textContent = '#' + tag;
                btn.onclick = () => {
                    const input = document.getElementById('addTags');
                    let cur = input.value.split(',').map(t => t.trim()).filter(t => t);
                    if (cur.includes(tag)) cur = cur.filter(t => t !== tag); else cur.push(tag);
                    input.value = cur.join(', '); refreshTagHintStyles();
                };
                container.appendChild(btn);
            });
            refreshTagHintStyles();
        }

        function refreshTagHintStyles() {
            const input = document.getElementById('addTags');
            if(!input) return;
            const cur = input.value.split(',').map(t => t.trim());
            document.querySelectorAll('#existingTagsContainer button').forEach(btn => {
                const tag = btn.textContent.replace('#', '');
                btn.className = cur.includes(tag) ? 'bg-blue-100 text-blue-600 border-blue-200' : 'bg-slate-100 text-slate-500 border-slate-200';
                btn.classList.add('px-3', 'py-1', 'text-[10px]', 'rounded-xl', 'font-black', 'border');
            });
        }

        async function handleLocalFileUpload(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (Array.isArray(data)) {
                        allMemos = data; 
                        currentDriveFileId = null;
                        await idbKeyval.set('travelMemos_cache', allMemos);
                        await idbKeyval.del('driveFileId_cache');
                        updateDriveUI(); render();
                        showMsg("ローカルから読み込みました");
                    }
                } catch (err) { showMsg("JSON読み込み失敗", true); }
            };
            reader.readAsText(file);
        }

        async function clearAllLocalData() {
            await idbKeyval.clear(); location.reload();
        }

        window.openLightbox = (src) => { 
            const img = document.getElementById('lightboxImg');
            if(img) img.src = getProxyImageUrl(src); 
            const box = document.getElementById('lightbox');
            if(box) box.classList.remove('hidden'); 
        };

        window.addEventListener('load', init);
    </script>
</body>
</html>
