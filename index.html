<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Scrapper</title>
    
    <!-- タブのアイコン (飛行機SVG) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2003/svg' viewBox='0 0 24 24' fill='none' stroke='%232563eb' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z'/></svg>">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- IndexedDB Library -->
    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
    
    <!-- Google API Loader -->
    <script async defer src="https://apis.google.com/js/api.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client"></script>

    <!-- config.js -->
    <script src="config.js" onerror="console.warn('config.js が見つかりません。')"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #f1f5f9;
        }
        .memo-grid {
            column-count: 1;
            column-gap: 1.5rem;
        }
        @media (min-width: 768px) { .memo-grid { column-count: 2; } }
        @media (min-width: 1024px) { .memo-grid { column-count: 3; } }
        .memo-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-enter { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="text-slate-900 pb-20">

    <!-- ナビゲーションバー (二段構成) -->
    <nav class="bg-white/90 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-3">
            <!-- 一段目: ロゴと同期ボタン -->
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-200 rotate-[-10deg]">
                        <i data-lucide="send" size="26"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-black text-slate-800 tracking-tight leading-none mb-1">Travel Scrapper</h1>
                        <p class="text-[10px] text-blue-600 font-bold uppercase tracking-[0.2em]">Web Viewer v1.6.4</p>
                    </div>
                </div>

                <button id="driveSyncBtn" class="flex items-center gap-2 px-6 py-2.5 bg-green-600 text-white rounded-xl font-bold text-sm shadow-lg shadow-green-100 active:scale-95 transition-all">
                    <i data-lucide="refresh-cw" size="18"></i>
                    <span id="driveSyncText">Drive同期</span>
                </button>
            </div>

            <!-- 二段目: 管理系アクション -->
            <div class="flex flex-wrap items-center gap-2">
                <div class="flex items-center gap-1 p-1 bg-slate-50 rounded-xl border border-slate-100">
                    <button id="drivePickerBtn" class="flex items-center gap-1.5 px-3 py-2 text-green-700 font-bold text-xs hover:bg-white rounded-lg transition-colors" title="Googleドライブから選択">
                        <i data-lucide="folder-open" size="16"></i>
                        <span>ファイル選択</span>
                    </button>
                    <div class="w-px h-4 bg-slate-200"></div>
                    <label for="fileInput" class="flex items-center gap-1.5 px-3 py-2 text-slate-600 font-bold text-xs hover:bg-white rounded-lg transition-colors cursor-pointer" title="ローカル読込">
                        <i data-lucide="file-up" size="16"></i>
                        <span>ローカル読込</span>
                    </label>
                    <input type="file" id="fileInput" accept=".json" class="hidden" />
                </div>

                <div class="flex-1"></div>

                <div class="flex items-center gap-1">
                    <button id="logoutBtn" class="hidden flex items-center gap-1.5 px-3 py-2 text-red-600 font-bold text-xs hover:bg-red-50 rounded-lg transition-colors">
                        <i data-lucide="log-out" size="16"></i>
                        <span>ログアウト</span>
                    </button>
                    <button id="clearDataBtn" class="flex items-center gap-1.5 px-3 py-2 text-slate-400 font-bold text-xs hover:text-red-500 rounded-lg transition-colors">
                        <i data-lucide="trash-2" size="16"></i>
                        <span>初期化</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 検索とタグ -->
    <div class="max-w-6xl mx-auto px-4 mt-6">
        <div class="bg-white p-4 md:p-6 rounded-3xl border border-slate-200 shadow-sm flex flex-col gap-4">
            <div class="relative">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size="20"></i>
                <input type="text" id="searchInput" placeholder="場所を検索..." class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-500/10 outline-none transition-all text-base shadow-inner" />
            </div>
            <div id="tagList" class="flex items-center gap-2 overflow-x-auto no-scrollbar py-1">
                <i data-lucide="tag" class="text-slate-400 shrink-0" size="16"></i>
                <button class="tag-chip px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all bg-blue-600 text-white" data-tag="all">すべて</button>
            </div>
        </div>
    </div>

    <!-- メイン表示エリア -->
    <main id="memoContainer" class="max-w-6xl mx-auto px-4 mt-8 memo-grid">
        <div class="col-span-full py-32 flex flex-col items-center text-center px-10 text-slate-400">
            <i data-lucide="plane" size="48" class="mb-4 opacity-20"></i>
            <p>同期中、またはデータがありません</p>
        </div>
    </main>

    <!-- 追加ボタン -->
    <button id="fabAdd" class="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-full shadow-lg shadow-blue-300 flex items-center justify-center hover:bg-blue-700 active:scale-90 transition-transform z-50">
        <i data-lucide="plus" size="28"></i>
    </button>

    <!-- 追加・編集モーダル -->
    <div id="addModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-6 shadow-2xl modal-enter max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-xl font-black text-slate-800 tracking-tight">場所を追加</h2>
                <button id="closeAddModalBtn" class="text-slate-400 hover:text-slate-600 transition-colors"><i data-lucide="x" size="24"></i></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-black text-slate-500 mb-1.5 ml-1 uppercase">タイトル *</label>
                    <div class="relative">
                        <input type="text" id="addTitle" class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="例：東京駅">
                        <button type="button" id="clear_addTitle" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hidden"><i data-lucide="x-circle" size="20"></i></button>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 mb-1.5 ml-1 uppercase tracking-widest">公式サイトURL (任意)</label>
                        <div class="relative">
                            <input type="url" id="addUrl" class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="https://...">
                            <button type="button" id="clear_addUrl" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hidden"><i data-lucide="x-circle" size="18"></i></button>
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-1.5 ml-1">
                            <label class="block text-[10px] font-black text-blue-600 uppercase tracking-widest flex items-center gap-1">
                                <i data-lucide="map-pin" size="12"></i> Googleマップ
                            </label>
                            <!-- ★ 自動入力ボタン -->
                            <button type="button" id="generateMapBtn" class="text-[10px] font-bold bg-blue-100 text-blue-700 px-2 py-0.5 rounded-lg hover:bg-blue-200 transition-colors">
                                自動で入力
                            </button>
                        </div>
                        <div class="relative">
                            <input type="url" id="addMapUrl" class="w-full pl-4 pr-10 py-3 bg-blue-50 border border-blue-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-sm text-blue-800" placeholder="上のボタンで自動生成できます">
                            <button type="button" id="clear_addMapUrl" class="absolute right-3 top-1/2 -translate-y-1/2 text-blue-300 hidden"><i data-lucide="x-circle" size="18"></i></button>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-500 mb-1.5 ml-1 uppercase tracking-widest">メモ</label>
                    <div class="relative">
                        <textarea id="addText" rows="2" class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none resize-none leading-relaxed text-sm" placeholder="見どころなど"></textarea>
                        <button type="button" id="clear_addText" class="absolute right-3 top-4 text-slate-300 hidden"><i data-lucide="x-circle" size="20"></i></button>
                    </div>
                </div>
                
                <div>
                    <label class="block text-xs font-black text-slate-500 mb-1.5 ml-1 uppercase tracking-widest">画像</label>
                    <div class="space-y-3">
                        <div class="relative">
                            <input type="url" id="addImageUrl" class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="URLを入力">
                            <button type="button" id="clear_addImageUrl" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hidden"><i data-lucide="x-circle" size="20"></i></button>
                        </div>
                        <div class="flex items-center gap-3 pl-1">
                            <span class="text-[10px] font-bold text-slate-300 uppercase">Or</span>
                            <label class="flex items-center gap-2 px-4 py-2 bg-white text-slate-600 rounded-xl cursor-pointer hover:bg-slate-50 border border-slate-200 text-xs font-bold shadow-sm">
                                <i data-lucide="image-plus" size="16"></i> ファイルを選択
                                <input type="file" id="addImageFile" accept="image/*" class="hidden">
                            </label>
                        </div>
                        <div id="previewContainer" class="relative hidden">
                            <img id="imagePreview" src="" class="w-full h-40 object-cover rounded-2xl border border-slate-200 shadow-sm">
                            <button type="button" id="clearPreviewBtn" class="absolute top-2 right-2 p-1.5 bg-slate-900/60 text-white rounded-full backdrop-blur-sm shadow-lg"><i data-lucide="x" size="16"></i></button>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-500 mb-1.5 ml-1 uppercase tracking-widest">タグ</label>
                    <div class="relative mb-2">
                        <input type="text" id="addTags" class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="カフェ, グルメなど">
                        <button type="button" id="clear_addTags" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hidden"><i data-lucide="x-circle" size="20"></i></button>
                    </div>
                    <div id="existingTagsContainer" class="flex flex-wrap gap-2 pl-1"></div>
                </div>

                <div class="flex gap-3 pt-4">
                    <button id="deleteMemoBtn" type="button" class="hidden px-5 py-4 bg-red-50 text-red-500 rounded-2xl font-bold hover:bg-red-100 transition-colors"><i data-lucide="trash-2" size="20"></i></button>
                    <button id="saveNewMemoBtn" type="button" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black flex items-center justify-center gap-2 hover:bg-blue-700 active:scale-95 transition-all shadow-lg shadow-blue-100"><i data-lucide="save" size="20"></i><span id="saveBtnText">保存する</span></button>
                </div>
            </div>
        </div>
    </div>

    <!-- ライトボックス -->
    <div id="lightbox" class="fixed inset-0 z-[100] hidden bg-black/95 flex items-center justify-center p-4 cursor-zoom-out" onclick="this.classList.add('hidden')">
        <img id="lightboxImg" src="" class="max-w-full max-h-full rounded shadow-2xl" />
    </div>

    <script>
        // --- State Management ---
        let allMemos = [];
        let currentTag = 'all';
        let searchQuery = '';
        let currentDriveFileId = null; 
        let uploadedImageDataUrl = ''; 
        let editingMemoId = null;

        // --- Config ---
        const CONFIG_READY = (typeof CONFIG !== 'undefined' && CONFIG.CLIENT_ID && !CONFIG.CLIENT_ID.includes('YOUR_'));
        const CLIENT_ID = CONFIG_READY ? CONFIG.CLIENT_ID : '';
        const API_KEY = CONFIG_READY ? CONFIG.API_KEY : '';
        const DISCOVERY_DOCS = ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"];
        const SCOPES = "https://www.googleapis.com/auth/drive";

        let tokenClient, accessToken = null, gapiInited = false, gisInited = false, actionAfterAuth = null;

        // --- Initialization ---
        async function init() {
            initLocalEvents();
            await loadPersistedData();
            await initGoogleAuth();
            render();
        }

        function initLocalEvents() {
            document.getElementById('fabAdd').onclick = openAddModal;
            document.getElementById('fileInput').onchange = handleLocalFileUpload;
            document.getElementById('searchInput').oninput = (e) => { searchQuery = e.target.value; render(); };
            document.querySelector('[data-tag="all"]').onclick = () => { currentTag = 'all'; render(); };
            document.getElementById('closeAddModalBtn').onclick = () => document.getElementById('addModal').classList.add('hidden');
            document.getElementById('saveNewMemoBtn').onclick = saveMemo;
            document.getElementById('deleteMemoBtn').onclick = deleteMemo;
            document.getElementById('clearDataBtn').onclick = clearAllLocalData;
            document.getElementById('logoutBtn').onclick = logout;
            document.getElementById('driveSyncBtn').onclick = handleSyncClick;
            document.getElementById('drivePickerBtn').onclick = handlePickerClick;
            // ★ 自動入力ボタンのイベント
            document.getElementById('generateMapBtn').onclick = generateMapLink;
            setupInputClearButtons();
            setupImageHandlers();
        }

        async function loadPersistedData() {
            const cached = await idbKeyval.get('travelMemos_cache');
            if (cached) allMemos = cached;
            currentDriveFileId = await idbKeyval.get('driveFileId_cache');
            accessToken = await idbKeyval.get('gapi_access_token');
            const expiry = await idbKeyval.get('gapi_token_expiry');
            if (expiry && Date.now() > parseInt(expiry)) {
                accessToken = null;
                await idbKeyval.del('gapi_access_token');
                await idbKeyval.del('gapi_token_expiry');
            }
        }

        async function initGoogleAuth() {
            if (!CONFIG_READY) return;
            try {
                await new Promise((resolve) => gapi.load('client', resolve));
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: DISCOVERY_DOCS });
                gapiInited = true;
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: SCOPES,
                    callback: async (resp) => {
                        if (resp.error) { actionAfterAuth = null; updateDriveUI(); return; }
                        await saveToken(resp.access_token);
                        if (actionAfterAuth === 'picker') createPicker();
                        else if (actionAfterAuth === 'sync') fetchDriveData(currentDriveFileId);
                        actionAfterAuth = null;
                    },
                });
                gisInited = true;
                if (accessToken) {
                    gapi.client.setToken({ access_token: accessToken });
                    updateDriveUI();
                    if (currentDriveFileId) fetchDriveData(currentDriveFileId);
                }
            } catch (e) { console.error("Auth Init Error:", e); }
        }

        // --- Drive Actions ---
        async function handleSyncClick() {
            if (!accessToken) { actionAfterAuth = 'sync'; tokenClient.requestAccessToken({prompt: 'consent'}); }
            else { if (currentDriveFileId) fetchDriveData(currentDriveFileId); else handlePickerClick(); }
        }

        async function handlePickerClick() {
            if (!accessToken) { actionAfterAuth = 'picker'; tokenClient.requestAccessToken({prompt: 'consent'}); }
            else { createPicker(); }
        }

        async function saveToken(token) {
            accessToken = token;
            gapi.client.setToken({ access_token: token });
            await idbKeyval.set('gapi_access_token', token);
            await idbKeyval.set('gapi_token_expiry', Date.now() + 3550 * 1000); 
            updateDriveUI();
        }

        async function logout() {
            if (!confirm("ログアウトしますか？")) return;
            accessToken = null;
            await idbKeyval.del('gapi_access_token');
            await idbKeyval.del('gapi_token_expiry');
            updateDriveUI(); location.reload();
        }

        function updateDriveUI() {
            const syncText = document.getElementById('driveSyncText');
            if (syncText) syncText.textContent = currentDriveFileId ? "Drive同期" : "Driveを開く";
            document.getElementById('logoutBtn')?.classList.toggle('hidden', !accessToken);
        }

        function createPicker() {
            const docsView = new google.picker.DocsView(google.picker.ViewId.DOCS).setMimeTypes('application/json');
            const picker = new google.picker.PickerBuilder()
                .addView(docsView).setOAuthToken(accessToken).setDeveloperKey(API_KEY)
                .setCallback(async (data) => {
                    if (data.action === google.picker.Action.PICKED) {
                        currentDriveFileId = data.docs[0].id; 
                        await idbKeyval.set('driveFileId_cache', currentDriveFileId);
                        updateDriveUI(); fetchDriveData(currentDriveFileId); 
                    }
                }).build();
            picker.setVisible(true);
        }

        async function fetchDriveData(fileId) {
            const btnText = document.getElementById('driveSyncText');
            const icon = document.querySelector('#driveSyncBtn i');
            if (btnText) btnText.textContent = "同期中...";
            if (icon) icon.classList.add('animate-spin');
            try {
                const resp = await gapi.client.drive.files.get({ fileId: fileId, alt: 'media' });
                let data = resp.result;
                if (typeof data === 'string') data = JSON.parse(data);
                if (Array.isArray(data)) {
                    allMemos = data;
                    await idbKeyval.set('travelMemos_cache', allMemos);
                    render();
                }
            } catch (e) {
                if (e.status === 401 || e.status === 403) { accessToken = null; updateDriveUI(); alert("ログイン期限が切れました。"); }
            } finally {
                if (btnText) btnText.textContent = currentDriveFileId ? "Drive同期" : "Driveを開く";
                if (icon) icon.classList.remove('animate-spin');
            }
        }

        async function uploadToDrive() {
            if (!currentDriveFileId || !accessToken) return true;
            try {
                const request = gapi.client.request({
                    path: '/upload/drive/v3/files/' + currentDriveFileId,
                    method: 'PATCH', params: { uploadType: 'media' }, body: JSON.stringify(allMemos, null, 2)
                });
                await new Promise((resolve, reject) => request.execute(r => r && r.error ? reject(r.error) : resolve(r)));
                return true;
            } catch (err) { return false; }
        }

        // --- Modal & Form ---
        function openAddModal() {
            editingMemoId = null;
            document.getElementById('modalTitle').textContent = '新しく追加';
            document.getElementById('saveBtnText').textContent = '追加する';
            document.getElementById('addTitle').value = ''; 
            document.getElementById('addUrl').value = '';
            document.getElementById('addMapUrl').value = '';
            document.getElementById('addText').value = ''; 
            document.getElementById('addTags').value = '';
            document.getElementById('addImageUrl').value = ''; 
            uploadedImageDataUrl = '';
            document.getElementById('previewContainer').classList.add('hidden');
            document.getElementById('deleteMemoBtn').classList.add('hidden'); 
            renderTagHints();
            document.getElementById('addModal').classList.remove('hidden');
            refreshClearBtnVisibility();
        }

        function setupInputClearButtons() {
            ['addTitle', 'addUrl', 'addMapUrl', 'addText', 'addImageUrl', 'addTags'].forEach(id => {
                const input = document.getElementById(id);
                const btn = document.getElementById(`clear_${id}`);
                if (!input || !btn) return;
                input.oninput = () => btn.classList.toggle('hidden', input.value.length === 0);
                btn.onclick = () => { input.value = ''; btn.classList.add('hidden'); input.focus(); if(id==='addTags') refreshTagHintStyles(); };
            });
        }

        // ★ 自動生成ロジック
        function generateMapLink() {
            const titleValue = document.getElementById('addTitle').value.trim();
            if (!titleValue) {
                alert("先にタイトルを入力してください！");
                document.getElementById('addTitle').focus();
                return;
            }
            const mapInput = document.getElementById('addMapUrl');
            mapInput.value = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(titleValue)}`;
            document.getElementById('clear_addMapUrl').classList.remove('hidden');
        }

        async function saveMemo() {
            const titleInput = document.getElementById('addTitle');
            const title = titleInput.value.trim();
            if (!title) { titleInput.focus(); return; }

            const btn = document.getElementById('saveNewMemoBtn');
            btn.disabled = true; document.getElementById('saveBtnText').textContent = '保存中...';

            const image = !document.getElementById('previewContainer').classList.contains('hidden') 
                        ? (uploadedImageDataUrl || document.getElementById('addImageUrl').value.trim()) : null;

            const newMemo = {
                id: editingMemoId || "m-" + Date.now(),
                title: title,
                url: document.getElementById('addUrl').value.trim(),
                mapUrl: document.getElementById('addMapUrl').value.trim(),
                text: document.getElementById('addText').value.trim(),
                image: image,
                tags: document.getElementById('addTags').value.split(',').map(t => t.trim()).filter(t => t),
                timestamp: new Date().toISOString()
            };

            const oldMemos = [...allMemos];
            if (editingMemoId) allMemos[allMemos.findIndex(m => m.id === editingMemoId)] = newMemo;
            else allMemos.unshift(newMemo);
            
            let success = true;
            if (currentDriveFileId && accessToken) success = await uploadToDrive();

            if (success) {
                await idbKeyval.set('travelMemos_cache', allMemos);
                document.getElementById('addModal').classList.add('hidden');
                render();
            } else { allMemos = oldMemos; alert("同期エラー。"); }
            btn.disabled = false; document.getElementById('saveBtnText').textContent = '保存する';
        }

        async function deleteMemo() {
            if (!confirm("削除しますか？")) return;
            const old = [...allMemos];
            allMemos = allMemos.filter(m => m.id !== editingMemoId);
            let success = true;
            if (currentDriveFileId && accessToken) success = await uploadToDrive();
            if (success) {
                await idbKeyval.set('travelMemos_cache', allMemos);
                document.getElementById('addModal').classList.add('hidden');
                render();
            } else { allMemos = old; alert("同期エラー"); }
        }

        // --- Rendering ---
        function render() {
            const container = document.getElementById('memoContainer');
            const filtered = allMemos.filter(m => {
                const textMatch = ((m.title || '') + (m.text || '')).toLowerCase().includes(searchQuery.toLowerCase());
                const tagMatch = currentTag === 'all' || (m.tags && m.tags.includes(currentTag));
                return textMatch && tagMatch;
            });

            if (allMemos.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-32 flex flex-col items-center text-center px-10 text-slate-400">
                        <i data-lucide="plane" size="48" class="mb-4 opacity-20"></i>
                        <p>データがありません。Drive同期をするか、右下の＋ボタンで追加してください。</p>
                    </div>`;
                if (typeof lucide !== 'undefined') lucide.createIcons();
                return;
            }

            container.innerHTML = filtered.map(m => `
                <div class="memo-item bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm flex flex-col hover:shadow-xl transition-all duration-300">
                    ${m.image ? `<img src="${m.image}" class="w-full h-auto cursor-zoom-in block" onclick="window.openLightbox('${m.image}')" loading="lazy">` : ''}
                    <div class="p-5 flex-1 flex flex-col">
                        <h3 class="font-black text-slate-800 mb-3 text-base leading-snug">${m.title}</h3>
                        ${m.text ? `<div class="bg-blue-50/40 text-blue-900 text-[13px] p-4 rounded-2xl mb-4 whitespace-pre-wrap leading-relaxed shadow-inner font-medium">${m.text}</div>` : ''}
                        <div class="flex flex-wrap gap-1.5 mb-5">${(m.tags || []).map(t => `<span class="px-2.5 py-1 bg-slate-100 text-slate-500 text-[10px] rounded-lg font-black uppercase">#${t}</span>`).join('')}</div>
                        
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${m.url ? `
                            <button onclick="window.open('${m.url}', '_blank')" class="flex-1 min-w-[90px] bg-blue-50 text-blue-600 text-[11px] font-black py-2.5 rounded-xl border border-blue-100 hover:bg-blue-100 flex items-center justify-center gap-1.5 transition-colors">
                                <i data-lucide="globe" size="14"></i>公式サイト
                            </button>` : ''}
                            ${m.mapUrl ? `
                            <button onclick="window.open('${m.mapUrl}', '_blank')" class="flex-1 min-w-[90px] bg-green-50 text-green-600 text-[11px] font-black py-2.5 rounded-xl border border-green-100 hover:bg-green-100 flex items-center justify-center gap-1.5 transition-colors">
                                <i data-lucide="map-pin" size="14"></i>マップ表示
                            </button>` : ''}
                        </div>

                        <div class="flex justify-between items-center pt-4 border-t border-slate-50 mt-auto">
                            <span class="text-[9px] text-slate-300 font-black uppercase tracking-tighter">${m.timestamp ? new Date(m.timestamp).toLocaleDateString() : ''}</span>
                            <button onclick="window.editMemo('${m.id}')" class="text-slate-400 hover:text-blue-600 transition-colors p-1"><i data-lucide="pencil" size="16"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
            updateFilterTags();
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        window.editMemo = (id) => {
            const memo = allMemos.find(m => m.id === id); if (!memo) return;
            editingMemoId = id;
            document.getElementById('modalTitle').textContent = '編集';
            document.getElementById('saveBtnText').textContent = '上書き保存';
            document.getElementById('addTitle').value = memo.title || '';
            document.getElementById('addUrl').value = memo.url || '';
            document.getElementById('addMapUrl').value = memo.mapUrl || '';
            document.getElementById('addText').value = memo.text || '';
            document.getElementById('addTags').value = (memo.tags || []).join(', ');
            uploadedImageDataUrl = '';
            if (memo.image) {
                document.getElementById('imagePreview').src = memo.image;
                document.getElementById('previewContainer').classList.remove('hidden');
                if (memo.image.startsWith('data:')) uploadedImageDataUrl = memo.image;
                else document.getElementById('addImageUrl').value = memo.image;
            } else { document.getElementById('previewContainer').classList.add('hidden'); }
            document.getElementById('deleteMemoBtn').classList.remove('hidden'); 
            renderTagHints(); document.getElementById('addModal').classList.remove('hidden');
            refreshClearBtnVisibility();
        }

        // --- Helpers ---
        function updateFilterTags() {
            const tags = new Set(); allMemos.forEach(m => (m.tags || []).forEach(t => tags.add(t)));
            document.querySelectorAll('.dynamic-tag').forEach(c => c.remove());
            Array.from(tags).sort().forEach(tag => {
                const btn = document.createElement('button');
                btn.className = `dynamic-tag px-5 py-2 rounded-full text-[11px] font-black transition-all ${currentTag === tag ? 'bg-blue-600 text-white shadow-lg' : 'bg-white border border-slate-200 text-slate-500 hover:border-blue-300'}`;
                btn.textContent = tag; btn.onclick = () => { currentTag = tag; render(); };
                document.getElementById('tagList').appendChild(btn);
            });
        }

        function renderTagHints() {
            const container = document.getElementById('existingTagsContainer');
            container.innerHTML = '';
            const tags = new Set(); allMemos.forEach(m => (m.tags || []).forEach(t => tags.add(t)));
            Array.from(tags).sort().forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'px-3 py-1 bg-slate-100 text-slate-500 text-[10px] rounded-xl font-black border border-slate-200 hover:bg-slate-200';
                btn.textContent = '#' + tag;
                btn.onclick = () => {
                    const input = document.getElementById('addTags');
                    let cur = input.value.split(',').map(t => t.trim()).filter(t => t);
                    if (cur.includes(tag)) cur = cur.filter(t => t !== tag); else cur.push(tag);
                    input.value = cur.join(', '); refreshTagHintStyles();
                };
                container.appendChild(btn);
            });
            refreshTagHintStyles();
        }

        function refreshTagHintStyles() {
            const input = document.getElementById('addTags');
            const cur = input.value.split(',').map(t => t.trim());
            document.querySelectorAll('#existingTagsContainer button').forEach(btn => {
                const tag = btn.textContent.replace('#', '');
                btn.className = cur.includes(tag) ? 'bg-blue-100 text-blue-600' : 'bg-slate-100 text-slate-500';
                btn.classList.add('px-3', 'py-1', 'text-[10px]', 'rounded-xl', 'font-black', 'border', 'border-slate-200');
            });
        }

        function refreshClearBtnVisibility() {
            ['addTitle', 'addUrl', 'addMapUrl', 'addText', 'addImageUrl', 'addTags'].forEach(id => {
                const val = document.getElementById(id).value;
                document.getElementById('clear_'+id).classList.toggle('hidden', val.length === 0);
            });
        }

        function setupImageHandlers() {
            document.getElementById('addImageFile').onchange = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX = 800; let w = img.width, h = img.height;
                        if (w > h && w > MAX) { h *= MAX/w; w = MAX; } else if (h > MAX) { w *= MAX/h; h = MAX; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        uploadedImageDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                        document.getElementById('imagePreview').src = uploadedImageDataUrl;
                        document.getElementById('previewContainer').classList.remove('hidden');
                        document.getElementById('addImageUrl').value = '';
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };
            document.getElementById('clearPreviewBtn').onclick = () => {
                uploadedImageDataUrl = ''; document.getElementById('previewContainer').classList.add('hidden');
            };
        }

        async function handleLocalFileUpload(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (Array.isArray(data)) {
                        allMemos = data; currentDriveFileId = null;
                        await idbKeyval.set('travelMemos_cache', allMemos);
                        await idbKeyval.del('driveFileId_cache');
                        updateDriveUI(); render();
                    }
                } catch (err) { alert("JSON読み込み失敗"); }
            };
            reader.readAsText(file);
        }

        async function clearAllLocalData() {
            if(!confirm("キャッシュを初期化しますか？")) return;
            await idbKeyval.clear(); location.reload();
        }

        window.openLightbox = (src) => { 
            document.getElementById('lightboxImg').src = src; 
            document.getElementById('lightbox').classList.remove('hidden'); 
        };

        window.addEventListener('load', init);
    </script>
</body>
</html>
